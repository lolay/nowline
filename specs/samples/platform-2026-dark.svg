<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 720" width="1400" height="720" font-family="-apple-system, 'SF Pro Display', 'Segoe UI', Helvetica, Arial, sans-serif">
  <!--
    Sample - Platform 2026 DARK theme
    Identical geometry + structure to sample 02. Milestone cut lines use
    a bright near-white ink (#e2e8f0) since pure black would vanish on dark.
  -->
  <defs>
    <filter id="nl-shadow-d" x="-8%" y="-8%" width="116%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <marker id="nl-arrow-d" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
    <marker id="nl-arrow-light-d" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <marker id="nl-arrow-ink-d" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#e2e8f0"/>
    </marker>
  </defs>

  <rect width="1400" height="720" fill="#0b1220"/>

  <!-- Header -->
  <g transform="translate(24,20)">
    <rect width="220" height="76" rx="6" fill="#111827" stroke="#1f2937" filter="url(#nl-shadow-d)"/>
    <g transform="translate(14,14)">
      <rect width="48" height="48" rx="8" fill="#e2e8f0"/>
      <text x="24" y="32" font-size="24" font-weight="700" fill="#0b1220" text-anchor="middle">A</text>
    </g>
    <text x="74" y="36" font-size="17" font-weight="700" fill="#e2e8f0">Platform 2026</text>
    <text x="74" y="54" font-size="11" fill="#94a3b8">Acme Engineering</text>
  </g>

  <!-- Merged anchor + milestone row (single marker row; collision at x=960
       stacks GA Date anchor ABOVE GA launch milestone). -->
  <g>
    <rect x="258" y="20" width="1118" height="26" fill="#111827" stroke="#1f2937" rx="4"/>

    <!-- kickoff anchor -->
    <g transform="translate(260,33)">
      <polygon points="0,-6 6,0 0,6 -6,0" fill="#0b1220" stroke="#cbd5e1" stroke-width="1.25"/>
    </g>
    <text x="272" y="37" font-size="10" fill="#cbd5e1">kickoff</text>

    <!-- Beta milestone -->
    <g transform="translate(470,33)">
      <polygon points="0,-6 6,0 0,6 -6,0" fill="#e2e8f0"/>
    </g>
    <text x="482" y="37" font-size="10" font-weight="600" fill="#e2e8f0">Beta</text>

    <!-- v1 GA milestone -->
    <g transform="translate(618,33)">
      <polygon points="0,-6 6,0 0,6 -6,0" fill="#e2e8f0"/>
    </g>
    <text x="630" y="37" font-size="10" font-weight="600" fill="#e2e8f0">v1 GA</text>

    <!-- Code Freeze anchor -->
    <g transform="translate(820,33)">
      <polygon points="0,-6 6,0 0,6 -6,0" fill="#0b1220" stroke="#cbd5e1" stroke-width="1.25"/>
    </g>
    <text x="828" y="37" font-size="10" fill="#cbd5e1">Code Freeze</text>

    <!-- Collision at x=960: GA Date anchor pushed UP above the row -->
    <g transform="translate(960,12)">
      <polygon points="0,-6 6,0 0,6 -6,0" fill="#0b1220" stroke="#cbd5e1" stroke-width="1.25"/>
    </g>
    <text x="972" y="16" font-size="10" fill="#cbd5e1">GA Date</text>
    <!-- GA launch milestone stays in-row -->
    <g transform="translate(960,33)">
      <polygon points="0,-6 6,0 0,6 -6,0" fill="#e2e8f0"/>
    </g>
    <text x="972" y="37" font-size="10" font-weight="600" fill="#e2e8f0">GA launch</text>
  </g>

  <!-- Week tick labels (moved up to y=46..70 now that marker rows are merged) -->
  <g transform="translate(258,46)">
    <rect width="1118" height="24" fill="#111827" stroke="#1f2937" rx="4"/>
    <g font-size="10" fill="#94a3b8" text-anchor="middle">
      <text x="2"   y="15">Jan 05</text>
      <text x="72"  y="15">Jan 12</text>
      <text x="142" y="15">Jan 19</text>
      <text x="212" y="15">Jan 26</text>
      <text x="282" y="15">Feb 02</text>
      <text x="352" y="15">Feb 09</text>
      <text x="422" y="15">Feb 16</text>
      <text x="492" y="15">Feb 23</text>
      <text x="562" y="15">Mar 02</text>
      <text x="632" y="15">Mar 09</text>
      <text x="702" y="15">Mar 16</text>
      <text x="772" y="15">Mar 23</text>
      <text x="842" y="15">Mar 30</text>
      <text x="912" y="15">Apr 06</text>
      <text x="982" y="15">Apr 13</text>
      <text x="1052" y="15">Apr 20</text>
    </g>
  </g>

  <!-- Weekly grid -->
  <g stroke="#1f2937" stroke-width="1" stroke-dasharray="2 3">
    <line x1="330"  y1="96" x2="330"  y2="580"/>
    <line x1="400"  y1="96" x2="400"  y2="580"/>
    <line x1="540"  y1="96" x2="540"  y2="580"/>
    <line x1="610"  y1="96" x2="610"  y2="580"/>
    <line x1="680"  y1="96" x2="680"  y2="580"/>
    <line x1="750"  y1="96" x2="750"  y2="580"/>
    <line x1="890"  y1="96" x2="890"  y2="580"/>
    <line x1="1030" y1="96" x2="1030" y2="580"/>
    <line x1="1100" y1="96" x2="1100" y2="580"/>
    <line x1="1170" y1="96" x2="1170" y2="580"/>
    <line x1="1240" y1="96" x2="1240" y2="580"/>
    <line x1="1310" y1="96" x2="1310" y2="580"/>
  </g>

  <!-- Swimlane 1 - Platform -->
  <g>
    <rect x="24" y="110" width="1352" height="320" fill="#111827" stroke="#1f2937"/>
    <g>
      <rect x="34" y="120" width="210" height="24" rx="4" fill="#1e293b" stroke="#334155"/>
      <text x="46" y="136" font-size="12" font-weight="600" fill="#c7d2fe">Platform</text>
      <text x="120" y="136" font-size="10" fill="#8b93b7">owner: Platform Team</text>
      <text x="238" y="132" font-size="10" font-weight="700" fill="#f87171" text-anchor="end">&#178;</text>
    </g>

    <!-- auth-refactor (done) - logical 3w=210, visual 198 with 6px inset each side -->
    <g transform="translate(266,160)">
      <rect width="198" height="60" rx="4" fill="#052e16" stroke="#34d399" filter="url(#nl-shadow-d)"/>
      <text x="12" y="20" font-size="13" font-weight="600" fill="#d1fae5">Auth refactor</text>
      <text x="12" y="36" font-size="10" fill="#6ee7b7">Sam Chen</text>
      <g transform="translate(12,40)">
        <rect width="58" height="13" rx="6" fill="#1e40af"/>
        <text x="29" y="10" font-size="8" font-weight="600" fill="#ffffff" text-anchor="middle">enterprise</text>
      </g>
      <g transform="translate(174,38)">
        <rect width="14" height="14" rx="2" fill="#5e6ad2"/>
        <path d="M4 10 L10 4 M6 4 H10 V8" stroke="#ffffff" fill="none" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round"/>
      </g>
      <circle cx="186" cy="12" r="5" fill="#34d399"/>
      <rect x="0" y="56" width="198" height="4" fill="#34d399" opacity="0.55"/>
    </g>

    <!-- Audit Track styled group - visual w=144, nested parallel inside -->
    <g transform="translate(476,232)">
      <rect width="144" height="124" rx="6" fill="#431407" stroke="#fb923c" filter="url(#nl-shadow-d)"/>
      <g transform="translate(8,-11)">
        <rect width="76" height="18" rx="3" fill="#fb923c"/>
        <text x="38" y="12" font-size="9" font-weight="600" fill="#1f2937" text-anchor="middle">Audit Track</text>
      </g>
      <g transform="translate(90,-11)">
        <rect width="54" height="18" rx="9" fill="#1e40af"/>
        <text x="27" y="12" font-size="8" font-weight="600" fill="#ffffff" text-anchor="middle">security</text>
      </g>

      <!-- Nested parallel indicator (rails hug inner item edges) -->
      <g stroke="#fb923c" fill="none" stroke-width="1" stroke-dasharray="3 3" opacity="0.6">
        <path d="M 8 12 V 112 M 136 12 V 112"/>
      </g>

      <!-- audit-log (in-progress, footnote 1) - visual 128 -->
      <g transform="translate(8,12)">
        <rect width="128" height="46" rx="4" fill="#172554" stroke="#60a5fa" filter="url(#nl-shadow-d)"/>
        <text x="10" y="18" font-size="12" font-weight="600" fill="#dbeafe">Audit log v2</text>
        <text x="10" y="32" font-size="9" fill="#93c5fd">30% remaining</text>
        <rect x="0" y="42" width="90" height="4" fill="#60a5fa" opacity="0.7"/>
        <text x="105" y="12" font-size="9" font-weight="700" fill="#f87171">&#185;</text>
        <circle cx="118" cy="10" r="5" fill="#60a5fa"/>
        <g transform="translate(110,28)">
          <rect width="12" height="12" rx="2" fill="#e2e8f0"/>
          <path d="M4 8 L8 4 M5 4 H8 V7" stroke="#0b1220" fill="none" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"/>
        </g>
      </g>

      <!-- audit-ui (planned) - visual 58 -->
      <g transform="translate(8,66)">
        <rect width="58" height="46" rx="4" fill="#1e293b" stroke="#64748b" filter="url(#nl-shadow-d)"/>
        <text x="10" y="22" font-size="11" font-weight="600" fill="#e2e8f0">Audit</text>
        <text x="10" y="34" font-size="11" font-weight="600" fill="#e2e8f0">UI</text>
        <circle cx="46" cy="10" r="5" fill="#94a3b8"/>
      </g>
    </g>

    <!-- SSO bare parallel track - visual 58 -->
    <g transform="translate(476,372)">
      <rect width="58" height="46" rx="4" fill="#1e293b" stroke="#64748b" filter="url(#nl-shadow-d)"/>
      <text x="12" y="18" font-size="12" font-weight="600" fill="#e2e8f0">SSO</text>
      <text x="12" y="32" font-size="9" fill="#94a3b8">1w</text>
      <circle cx="46" cy="10" r="5" fill="#94a3b8"/>
    </g>

    <!-- No outer parallel rails: outer parallel is `bracket:none`, so no
         visual connector per spec. -->

    <!-- platform-qa: next sibling after the parallel block. Visual x=636.
         No dependency arrows: no `after:` on qa, outer parallel is bracket:none. -->
    <g transform="translate(636,282)">
      <rect width="58" height="60" rx="4" fill="#1e293b" stroke="#64748b" filter="url(#nl-shadow-d)"/>
      <text x="12" y="18" font-size="12" font-weight="600" fill="#e2e8f0">QA</text>
      <text x="12" y="32" font-size="10" fill="#94a3b8">3d</text>
      <text x="12" y="48" font-size="9" font-weight="600" fill="#a78bfa">Handoff</text>
      <circle cx="46" cy="10" r="5" fill="#a78bfa"/>
    </g>
  </g>

  <!-- Swimlane 2 - Mobile -->
  <g>
    <rect x="24" y="430" width="1352" height="150" fill="#0f172a" stroke="#1f2937"/>
    <line x1="24" y1="430" x2="1376" y2="430" stroke="#1f2937"/>

    <g>
      <rect x="34" y="440" width="200" height="24" rx="4" fill="#422006" stroke="#854d0e"/>
      <text x="46" y="456" font-size="12" font-weight="600" fill="#fde68a">Mobile</text>
      <text x="110" y="456" font-size="10" fill="#fcd34d">owner: Mobile Team</text>
      <text x="228" y="452" font-size="10" font-weight="700" fill="#f87171" text-anchor="end">&#178;</text>
    </g>

    <!-- Offline mode (at-risk) - logical 3w=210, visual 198 -->
    <g transform="translate(266,480)">
      <rect width="198" height="60" rx="4" fill="#422006" stroke="#facc15" filter="url(#nl-shadow-d)"/>
      <text x="12" y="20" font-size="13" font-weight="600" fill="#fef3c7">Offline mode</text>
      <text x="12" y="36" font-size="10" fill="#fde68a">Jennifer Wu - 60% remaining</text>
      <g transform="translate(12,40)">
        <rect width="94" height="13" rx="6" fill="#0b1220" stroke="#fb923c" stroke-dasharray="3 2"/>
        <text x="47" y="10" font-size="8" font-weight="600" fill="#fdba74" text-anchor="middle">low-confidence</text>
      </g>
      <circle cx="186" cy="12" r="5" fill="#facc15"/>
      <rect x="0" y="56" width="79" height="4" fill="#facc15" opacity="0.7"/>
    </g>

    <!-- Push v2 (planned) - logical 2w=140, visual 128 -->
    <g transform="translate(476,480)">
      <rect width="128" height="60" rx="4" fill="#1e293b" stroke="#64748b" filter="url(#nl-shadow-d)"/>
      <text x="12" y="20" font-size="13" font-weight="600" fill="#e2e8f0">Push v2</text>
      <text x="12" y="36" font-size="10" fill="#94a3b8">2w</text>
      <circle cx="116" cy="12" r="5" fill="#94a3b8"/>
    </g>
  </g>

  <!-- Dependency arrow: auth-refactor visual right (x=464) -> audit-log visual left (x=484) -->
  <g stroke="#94a3b8" fill="none" stroke-width="1.1" marker-end="url(#nl-arrow-d)" stroke-linejoin="round">
    <path d="M 464 190 H 474 V 265 H 482"/>
  </g>

  <!-- Milestone predecessor connector (v1 GA): from auth-refactor visual right to milestone line at x=618 -->
  <g stroke="#e2e8f0" fill="none" stroke-width="1.1" stroke-dasharray="3 3" stroke-linecap="round" marker-end="url(#nl-arrow-ink-d)">
    <path d="M 464 190 H 612"/>
  </g>

  <!-- Anchor cut lines (dashed) - drawn late so they overlay the swimlane
       fills just like the now-line does. Emerge from the diamond bottom
       tip (y=39) and run to the bottom of the chart. -->
  <g stroke="#475569" stroke-width="1" stroke-dasharray="1 3" fill="none">
    <line x1="260" y1="39" x2="260" y2="580"/>
    <line x1="820" y1="39" x2="820" y2="580"/>
  </g>

  <!-- Milestone cut lines - drawn late so they overlay the swimlane
       fills like the now-line does.
       Prominent dashed verticals: bright ink on the dark palette,
       thicker stroke, visible dash pattern. -->
  <g stroke="#f1f5f9" stroke-width="2" stroke-dasharray="6 4" stroke-linecap="round" fill="none">
    <line x1="470" y1="39" x2="470" y2="580"/>
    <line x1="618" y1="39" x2="618" y2="580"/>
    <line x1="960" y1="39" x2="960" y2="580"/>
  </g>

  <!-- Now-line -->
  <g>
    <line x1="610" y1="20" x2="610" y2="580" stroke="#f87171" stroke-width="2.25"/>
    <g transform="translate(610,14)">
      <rect x="-20" y="-14" width="40" height="18" rx="9" fill="#f87171"/>
      <text x="0" y="-1" font-size="10" font-weight="700" fill="#0b1220" text-anchor="middle">now</text>
    </g>
  </g>

  <!-- Footnote area -->
  <g>
    <rect x="24" y="604" width="1352" height="92" rx="6" fill="#111827" stroke="#1f2937"/>
    <text x="40" y="628" font-size="12" font-weight="700" fill="#e2e8f0">Footnotes</text>
    <g transform="translate(40,642)">
      <text x="0" y="14" font-size="10" font-weight="700" fill="#f87171">1</text>
      <text x="16" y="14" font-size="11" font-weight="600" fill="#e2e8f0">Vendor dependency</text>
      <text x="134" y="14" font-size="11" fill="#94a3b8">- Blocked until vendor contract is signed. Expected March resolution.</text>
    </g>
    <g transform="translate(40,664)">
      <text x="0" y="14" font-size="10" font-weight="700" fill="#f87171">2</text>
      <text x="16" y="14" font-size="11" font-weight="600" fill="#e2e8f0">Team capacity risk</text>
      <text x="134" y="14" font-size="11" fill="#94a3b8">- Mobile team is down to 2 engineers through Q2.</text>
    </g>
    <!-- Nowline attribution mark - bottom-right of the footnote panel.
         Panel bounds: x=[24,1376], y=[604,696]. Anchored 12px inside the
         bottom-right corner, drawn on top of panel content. -->
    <g transform="translate(1331,673) scale(0.22)">
      <text x="0" y="40" font-size="40" font-weight="700" fill="#475569">now</text>
      <rect x="92" y="12" width="5" height="40" fill="#f87171"/>
      <text x="100" y="40" font-size="40" font-weight="400" fill="#475569">ine</text>
    </g>
  </g>
</svg>
