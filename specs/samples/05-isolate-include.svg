<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600" font-family="-apple-system, 'SF Pro Display', 'Segoe UI', Helvetica, Arial, sans-serif">
  <!--
    Sample 05 - roadmap:isolate included region
    Demonstrates:
      - Native swimlanes (Core, Integrations) come FIRST (in parent file order)
      - Included "Partner" roadmap follows, rendered inside a dashed-border region
      - Region label at top-left of the dashed border with external-link badge
      - Cross-region dependency arrow passing from inside the isolate into
        the parent's Integrations swimlane
      - Shared timeline header + now-line
      - GA milestone (after:bridge) renders as a solid black vertical at the
        rightmost predecessor's end. Only one predecessor, so no inbound
        dotted connector arrows. Black because nothing overruns.

    Parent file order:
      swimlane core "Core"               -> top swimlane
      swimlane integrations "Integrations" -> below core
      include "partner.nowline" roadmap:isolate -> renders at end, after
        all native swimlanes of the parent, in include order

    Column: 1w = 90px. Timeline origin at x=325 (= 280 + 45 inset).
    Ticks: Jan05 325 / Jan12 415 / Jan19 505 / Jan26 595 / Feb02 685 /
           Feb09 775 / Feb16 865 / Feb23 955 / Mar02 1045 / Mar09 1135
  -->

  <defs>
    <filter id="nl-shadow-subtle-5" x="-8%" y="-8%" width="116%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <marker id="nl-arrow-5" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>

  <rect width="1200" height="600" fill="#f8fafc"/>

  <!-- Header box -->
  <g transform="translate(20,20)">
    <rect width="240" height="78" rx="6" fill="#ffffff" stroke="#e2e8f0" filter="url(#nl-shadow-subtle-5)"/>
    <text x="16" y="28" font-size="15" font-weight="700" fill="#0f172a">Primary Release</text>
    <text x="16" y="46" font-size="10" fill="#64748b">Core + Integrations, partner</text>
    <text x="16" y="60" font-size="10" fill="#64748b">(isolated include below)</text>
  </g>

  <!-- Anchor + milestone row -->
  <g>
    <rect x="280" y="20" width="900" height="26" fill="#ffffff" stroke="#e2e8f0" rx="4"/>
    <!-- kickoff anchor (Jan 05, x=325) -->
    <g transform="translate(325,33)">
      <polygon points="0,-6 6,0 0,6 -6,0" fill="#ffffff" stroke="#334155" stroke-width="1.25"/>
    </g>
    <text x="337" y="37" font-size="10" fill="#334155">kickoff</text>
    <!-- GA milestone (after:bridge, x=1045). Black: no predecessor overruns. -->
    <g transform="translate(1045,33)">
      <polygon points="0,-6 6,0 0,6 -6,0" fill="#0f172a"/>
    </g>
    <text x="1057" y="37" font-size="10" font-weight="600" fill="#0f172a">GA</text>
  </g>

  <!-- Tick labels row -->
  <g transform="translate(280,50)">
    <rect width="900" height="28" fill="#ffffff" stroke="#e2e8f0" rx="4"/>
    <g font-size="10" fill="#64748b" text-anchor="middle">
      <text x="45"  y="18">Jan 05</text>
      <text x="135" y="18">Jan 12</text>
      <text x="225" y="18">Jan 19</text>
      <text x="315" y="18">Jan 26</text>
      <text x="405" y="18">Feb 02</text>
      <text x="495" y="18">Feb 09</text>
      <text x="585" y="18">Feb 16</text>
      <text x="675" y="18">Feb 23</text>
      <text x="765" y="18">Mar 02</text>
      <text x="855" y="18">Mar 09</text>
    </g>
  </g>

  <!-- Grid lines -->
  <g stroke="#e2e8f0" stroke-width="1" stroke-dasharray="2 3">
    <line x1="415"  y1="78" x2="415"  y2="530"/>
    <line x1="505"  y1="78" x2="505"  y2="530"/>
    <line x1="595"  y1="78" x2="595"  y2="530"/>
    <line x1="685"  y1="78" x2="685"  y2="530"/>
    <line x1="775"  y1="78" x2="775"  y2="530"/>
    <line x1="865"  y1="78" x2="865"  y2="530"/>
    <line x1="955"  y1="78" x2="955"  y2="530"/>
    <line x1="1135" y1="78" x2="1135" y2="530"/>
  </g>

  <!-- =========================================================
       Native swimlane 1: Core
       ========================================================= -->
  <g>
    <rect x="20" y="90" width="1160" height="110" fill="#ffffff" stroke="#e2e8f0"/>
    <g>
      <rect x="30" y="100" width="80" height="22" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/>
      <text x="40" y="115" font-size="12" font-weight="600" fill="#334155">Core</text>
    </g>
    <!-- core-api: logical 3w=270 (x=325..595), visual x=331, width=258.
         12px symmetric gutter on each side (6px inset each side). -->
    <g transform="translate(331,140)">
      <rect width="258" height="48" rx="4" fill="#ecfdf5" stroke="#10b981" filter="url(#nl-shadow-subtle-5)"/>
      <text x="12" y="18" font-size="13" font-weight="600" fill="#064e3b">Core API</text>
      <text x="12" y="34" font-size="10" fill="#047857">3w</text>
      <circle cx="246" cy="10" r="5" fill="#10b981"/>
      <rect x="0" y="44" width="258" height="4" fill="#10b981" opacity="0.5"/>
    </g>
    <!-- migrations: logical 2w=180 (x=595..775), visual x=601, width=168 -->
    <g transform="translate(601,140)">
      <rect width="168" height="48" rx="4" fill="#eff6ff" stroke="#3b82f6" filter="url(#nl-shadow-subtle-5)"/>
      <text x="12" y="18" font-size="13" font-weight="600" fill="#1e3a8a">Migrations</text>
      <text x="12" y="34" font-size="10" fill="#1d4ed8">2w</text>
      <circle cx="156" cy="10" r="5" fill="#3b82f6"/>
      <rect x="0" y="44" width="101" height="4" fill="#3b82f6" opacity="0.6"/>
    </g>
  </g>

  <!-- =========================================================
       Native swimlane 2: Integrations
       ========================================================= -->
  <g>
    <rect x="20" y="210" width="1160" height="110" fill="#fafafa" stroke="#e2e8f0"/>
    <g>
      <rect x="30" y="220" width="110" height="22" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/>
      <text x="40" y="235" font-size="12" font-weight="600" fill="#334155">Integrations</text>
    </g>
    <!-- bridge: logical 2w=180 (x=865..1045), visual x=871, width=168.
         after:[migrations(end=775), partner.plugin-beta(end=865)] -> logical start x=865 -->
    <g transform="translate(871,260)">
      <rect width="168" height="48" rx="4" fill="#f8fafc" stroke="#94a3b8" filter="url(#nl-shadow-subtle-5)"/>
      <text x="12" y="18" font-size="13" font-weight="600" fill="#1e293b">Partner bridge</text>
      <text x="12" y="34" font-size="10" fill="#64748b">2w</text>
      <circle cx="156" cy="10" r="5" fill="#94a3b8"/>
    </g>
  </g>

  <!-- =========================================================
       Isolated include region (Partner) - appears LAST, after all
       parent-file swimlanes, in include order.
       ========================================================= -->
  <g>
    <rect x="20" y="340" width="1160" height="160"
          fill="#fafaf9" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="6 4" rx="6"/>

    <!-- Region label + external badge (sits on the top edge) -->
    <g transform="translate(30,330)">
      <rect width="300" height="22" rx="4" fill="#ffffff" stroke="#8b5cf6"/>
      <text x="10" y="15" font-size="11" font-weight="600" fill="#5b21b6">Partner - Vendor plugin roadmap</text>
      <g transform="translate(278,4)">
        <rect width="14" height="14" rx="2" fill="#ede9fe" stroke="#8b5cf6"/>
        <path d="M4 10 L10 4 M6 4 H10 V8" stroke="#5b21b6" fill="none" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
      </g>
    </g>

    <g>
      <rect x="30" y="360" width="80" height="22" rx="4" fill="#ede9fe" stroke="#c4b5fd"/>
      <text x="40" y="375" font-size="12" font-weight="600" fill="#5b21b6">Plugin</text>
    </g>

    <!-- plugin-alpha: logical 4w=360 (x=325..685), visual x=331, width=348, after:kickoff -->
    <g transform="translate(331,400)">
      <rect width="348" height="48" rx="4" fill="#faf5ff" stroke="#a78bfa" filter="url(#nl-shadow-subtle-5)"/>
      <text x="12" y="18" font-size="13" font-weight="600" fill="#4c1d95">Plugin alpha</text>
      <text x="12" y="34" font-size="10" fill="#6d28d9">4w - partner.plugin-alpha</text>
      <circle cx="336" cy="10" r="5" fill="#3b82f6"/>
      <rect x="0" y="44" width="261" height="4" fill="#a78bfa" opacity="0.7"/>
    </g>
    <!-- plugin-beta: logical 2w=180 (x=685..865), visual x=691, width=168, after:plugin-alpha -->
    <g transform="translate(691,400)">
      <rect width="168" height="48" rx="4" fill="#faf5ff" stroke="#a78bfa" filter="url(#nl-shadow-subtle-5)"/>
      <text x="12" y="18" font-size="13" font-weight="600" fill="#4c1d95">Plugin beta</text>
      <text x="12" y="34" font-size="10" fill="#6d28d9">2w - partner.plugin-beta</text>
      <circle cx="156" cy="10" r="5" fill="#94a3b8"/>
    </g>
  </g>

  <!-- =========================================================
       Dependency arrows - attach to VISUAL bar edges so arrowheads
       land on the item bars, not in the inter-column gutters.
       ========================================================= -->
  <g stroke="#475569" fill="none" stroke-width="1.1" marker-end="url(#nl-arrow-5)" stroke-linejoin="round">
    <!-- kickoff anchor (x=325) -> core-api visual top-left (x=331) -->
    <path d="M 325 42 V 136 H 329"/>
    <!-- kickoff -> plugin-alpha: route around the left edge of the isolate
         region so it doesn't pierce Core API / Integrations items. -->
    <path d="M 325 42 V 96 H 310 V 400 H 329"/>
    <!-- migrations visual right (x=769) -> bridge visual left (x=871, y=282) -->
    <path d="M 769 164 H 866 V 282"/>
    <!-- plugin-beta visual right (x=859) -> bridge bottom: UP through dashed top border -->
    <path d="M 859 398 V 310"/>
  </g>

  <!-- kickoff anchor dashed vertical - drawn late so it overlays swimlane
       fills (like the now-line). Emerges from diamond bottom tip (y=39). -->
  <line x1="325" y1="39" x2="325" y2="530" stroke="#64748b" stroke-width="1" stroke-dasharray="1 3"/>

  <!-- GA milestone vertical - drawn late so it overlays swimlane
       fills (like the now-line).
       Prominent dashed ink - thicker stroke, visible dash pattern. -->
  <line x1="1045" y1="39" x2="1045" y2="530" stroke="#1e1b4b" stroke-width="2" stroke-dasharray="6 4" stroke-linecap="round"/>

  <!-- Now-line - Feb 02 (x=685) -->
  <g>
    <line x1="685" y1="20" x2="685" y2="530" stroke="#e53e3e" stroke-width="2.25"/>
    <g transform="translate(685,14)">
      <rect x="-20" y="-14" width="40" height="18" rx="9" fill="#e53e3e"/>
      <text x="0" y="-1" font-size="10" font-weight="700" fill="#ffffff" text-anchor="middle">now</text>
    </g>
  </g>

  <!-- Nowline attribution mark - bottom-right of the last region (the isolate
       include region, x=[20,1180], y=[340,500]; no footnotes in this sample).
       Anchored 12px inside the bottom-right corner, drawn on top. -->
  <g transform="translate(1135,477) scale(0.22)">
    <text x="0" y="40" font-size="40" font-weight="700" fill="#94a3b8">now</text>
    <rect x="92" y="12" width="5" height="40" fill="#e53e3e"/>
    <text x="100" y="40" font-size="40" font-weight="400" fill="#94a3b8">ine</text>
  </g>

  <!-- Caption -->
  <text x="20" y="558" font-size="11" fill="#64748b" font-style="italic">
    Sample 05 - Isolate include: native swimlanes render first (Core, Integrations), then the included
    "Partner" roadmap renders in a dashed-border region below them. Cross-region arrows pass through.
  </text>
</svg>
