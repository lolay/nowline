<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 180" width="560" height="180">
  <!--
    Nowline Primary Logo
    The "l" is a red vertical line (the now-line) with a diamond at the bottom
    where it meets the gray timeline.
  -->

  <!-- "now" — bold weight -->
  <text
    x="48" y="118"
    font-family="Inter, 'SF Pro Display', -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="92"
    font-weight="700"
    fill="#1a1a2e"
    letter-spacing="-1.5"
  >now</text>

  <!-- Red "l" — the now-line, extends from ascender down past baseline -->
  <rect x="274" y="34" width="9" height="118" rx="1.5" fill="#e53e3e"/>

  <!-- "ine" — regular weight -->
  <text
    x="290" y="118"
    font-family="Inter, 'SF Pro Display', -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="92"
    font-weight="400"
    fill="#1a1a2e"
    letter-spacing="-1.5"
  >ine</text>

  <!-- Left timeline segment -->
  <line x1="44" y1="152" x2="266" y2="152" stroke="#c0c0c0" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Right timeline segment -->
  <line x1="292" y1="152" x2="516" y2="152" stroke="#c0c0c0" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Red diamond at the bottom of the now-line, on the timeline -->
  <polygon points="278.5,138 292,152 278.5,166 265,152" fill="#e53e3e"/>
</svg>
