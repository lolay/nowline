<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!--
    Nowline GitHub App icon (1024x1024).
    Standalone mark (red now-line bar + red diamond) on white.
    8x scale of branding/marketplace-publisher-icon.svg, with the same
    safe padding so the mark survives GitHub's rounded-square masking.
  -->
  <rect width="1024" height="1024" fill="#ffffff"/>

  <!-- Red now-line bar -->
  <rect x="476" y="152" width="72" height="720" rx="36" fill="#e53e3e"/>

  <!-- Red diamond at the bottom of the bar (centered on the canvas) -->
  <polygon points="512,296 728,512 512,728 296,512" fill="#e53e3e"/>
</svg>
