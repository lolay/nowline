<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!--
    Nowline GitHub App icon - Deploy bot variant (1024x1024).
    Base mark from github-app-icon.svg, with a charcoal circle badge in the
    bottom-right 25% x 25% region containing the GitHub Octicons "rocket-24"
    glyph (MIT, https://github.com/primer/octicons).
  -->
  <rect width="1024" height="1024" fill="#ffffff"/>

  <!--
    Nowline mark, shifted (-96, -96) from the centered position used in
    github-app-icon.svg. The bar/diamond move up-and-left so the bottom-
    right bot badge has its own anchor space; the diamond's right and
    bottom points clear the badge, while the bottom-right edge tucks
    under the badge's upper-left arc.
  -->
  <!-- Red now-line bar -->
  <rect x="380" y="56" width="72" height="720" rx="36" fill="#e53e3e"/>

  <!-- Red diamond -->
  <polygon points="416,200 632,416 416,632 200,416" fill="#e53e3e"/>

  <!--
    Bot badge: charcoal circle in the bottom-right with a white separator ring
    so it reads cleanly where it overlaps the red diamond. Both the radius
    (240) and the stroke (24) are 2x the original (120 / 12) to match the 2x
    glyph scale below, preserving the original glyph-to-badge ratio. The badge
    is positioned at (680, 680) so its outermost diagonal point sits ~24px
    inside the 1024 canvas's inscribed circle (radius 512). That gives both
    GitHub's rounded-square *and* circular avatar masks (used for bot
    comments) a safe margin without clipping the white ring.
  -->
  <circle cx="680" cy="680" r="240" fill="#1a1a2e" stroke="#ffffff" stroke-width="24"/>

  <!-- Octicons "rocket-24", scaled 12x and centered on the badge (24*12 = 288). -->
  <g fill="#ffffff" transform="translate(536 536) scale(12)">
    <path d="M20.322.75h1.176a1.75 1.75 0 0 1 1.75 1.749v1.177a10.75 10.75 0 0 1-2.925 7.374l-1.228 1.304a23.699 23.699 0 0 1-1.596 1.542v5.038c0 .615-.323 1.184-.85 1.5l-4.514 2.709a.75.75 0 0 1-1.12-.488l-.963-4.572a1.305 1.305 0 0 1-.14-.129L8.04 15.96l-1.994-1.873a1.305 1.305 0 0 1-.129-.14l-4.571-.963a.75.75 0 0 1-.49-1.12l2.71-4.514c.316-.527.885-.85 1.5-.85h5.037a23.668 23.668 0 0 1 1.542-1.594l1.304-1.23A10.753 10.753 0 0 1 20.321.75Zm-6.344 4.018v-.001l-1.304 1.23a22.275 22.275 0 0 0-3.255 3.851l-2.193 3.29 1.859 1.744a.545.545 0 0 1 .034.034l1.743 1.858 3.288-2.192a22.263 22.263 0 0 0 3.854-3.257l1.228-1.303a9.251 9.251 0 0 0 2.517-6.346V2.5a.25.25 0 0 0-.25-.25h-1.177a9.252 9.252 0 0 0-6.344 2.518ZM6.5 21c-1.209 1.209-3.901 1.445-4.743 1.49a.236.236 0 0 1-.18-.067.236.236 0 0 1-.067-.18c.045-.842.281-3.534 1.49-4.743.9-.9 2.6-.9 3.5 0 .9.9.9 2.6 0 3.5Zm-.592-8.588L8.17 9.017c.23-.346.47-.685.717-1.017H5.066a.25.25 0 0 0-.214.121l-2.167 3.612ZM16 15.112c-.333.248-.672.487-1.018.718l-3.393 2.262.678 3.223 3.612-2.167a.25.25 0 0 0 .121-.214ZM17.5 8a1.5 1.5 0 1 1-3.001-.001A1.5 1.5 0 0 1 17.5 8Z"/>
  </g>
</svg>
