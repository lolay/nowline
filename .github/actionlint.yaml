# actionlint configuration. See https://github.com/rhysd/actionlint/blob/main/docs/config.md
#
# Scope: this file only ignores known-noise patterns inside gh-aw-generated
# lock files (`.github/workflows/agent-*.lock.yml`). Hand-written workflows
# (everything else under .github/workflows/) are linted with the default
# strict ruleset. If gh-aw upstream introduces a new warning shape, we want
# to know about it — so the ignore list is targeted, not blanket.

self-hosted-runner:
  labels: []

config-variables: null

paths:
  # gh-aw-generated lock files: regenerated by `gh aw compile` and reflect
  # upstream's template choices, not ours. The patterns below cover the
  # specific shellcheck info-level warnings and the actionlint syntax-check
  # gap (concurrency.queue) seen on gh-aw v0.74.8 / actionlint v1.7.12.
  .github/workflows/agent-*.lock.yml:
    ignore:
      - 'shellcheck reported issue in this script: SC\d+:'
      - 'unexpected key "queue" for "concurrency" section'
