name: Cursor engine sync

# Opens a monthly tracking issue assigned to copilot-swe-agent[bot], which
# decides whether to bump engines.vscode and @types/vscode in
# packages/vscode-extension/package.json per the Cursor-tracking policy in
# CONTRIBUTING.md § VS Code extension engine floor policy.
#
# The job is idempotent: if an open issue labelled cursor-engine-sync already
# exists (e.g. the agent's PR is still in review), no second issue is opened.
#
# Authentication — GitHub App with user-to-server token
# ----------------------------------------
# Assigning copilot-swe-agent[bot] requires a token associated with a user
# account that has a Copilot seat (GitHub's billing model rejects GitHub App
# installation tokens for the Copilot assignment API; the default
# GITHUB_TOKEN also lacks the necessary user context). This workflow uses a
# GitHub App configured with "User-to-server token expiration", driven by a
# refresh token that rotates on every run. The App is `lolay-nowline-copilot-assign`
# (App ID 3829843); it's distinct from `lolay-nowline-release` so a leaked
# release-side secret can't impersonate the engine-sync identity (and vice
# versa).
#
#   secrets.COPILOT_APP_CLIENT_ID      — App's OAuth Client ID (used by the
#                                        refresh-token exchange below)
#   secrets.COPILOT_APP_CLIENT_SECRET  — App's OAuth Client Secret
#   secrets.COPILOT_APP_PRIVATE_KEY    — App's private key (.pem)
#   secrets.COPILOT_APP_REFRESH_TOKEN  — current refresh token (rotated on
#                                        each successful run)
#   vars.COPILOT_APP_ID                — App's numeric ID. Consumed by
#                                        actions/create-github-app-token via
#                                        `app-id:`. Must match the App that
#                                        the private key was issued for, or
#                                        GitHub rejects the signed JWT with
#                                        a generic 401 `JSON web token could
#                                        not be decoded` error.
#
# Flow per run:
#   1. Mint an installation access token (via the App's private key) with
#      `secrets: write` so we can rotate the refresh-token secret. The App
#      itself must have "Secrets: Read and write" granted in its repo
#      permissions for the installation; "Actions" is a separate permission
#      and does not cover the /actions/secrets endpoints (an earlier version
#      of this workflow requested `actions:write` and 403'd on the public-key
#      fetch — keep `secrets:write` here).
#   2. Exchange the stored refresh token for a fresh
#      (access_token, refresh_token) pair via POST /login/oauth/access_token.
#   3. Write the NEW refresh token to the secret BEFORE doing anything with
#      the new access token — if we use the access token first and any
#      downstream step fails, the consumed refresh token never gets stored
#      and the next run's authentication breaks. Rotating first means a
#      mid-run failure costs us a single skipped issue, not the refresh
#      chain.
#   4. Use the fresh access token (TTL 8h) to create the tracking issue and
#      assign copilot-swe-agent[bot].
#
# If `secrets.COPILOT_APP_REFRESH_TOKEN` is unset or stale (e.g. workflow
# paused > 6 months and the refresh token expired), the curl step fails
# loudly. Recovery: re-do OAuth authorize-and-exchange as documented in
# CONTRIBUTING.md and re-set the secret.

on:
    schedule:
        - cron: "0 12 1 * *"  # 12:00 UTC on the 1st of each month
    workflow_dispatch:

permissions:
    contents: read
    issues: read  # default GITHUB_TOKEN is only used by `gh issue list`; issue create uses the user-to-server token from the refresh step

jobs:
    open-tracking-issue:
        name: Open Cursor engine tracking issue
        runs-on: ubuntu-latest
        steps:
            - name: Checkout (for agent prompt)
              uses: actions/checkout@v6

            - name: Check for existing open issue
              id: existing
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  set -euo pipefail
                  count=$(gh issue list \
                      --repo "$GITHUB_REPOSITORY" \
                      --label "cursor-engine-sync" \
                      --state open \
                      --json number \
                      --jq 'length')
                  echo "count=$count" >> "$GITHUB_OUTPUT"
                  echo "Open cursor-engine-sync issues: $count"

            - name: Mint App installation token (for secret rotation)
              id: app-installation
              if: steps.existing.outputs.count == '0'
              uses: actions/create-github-app-token@v3
              with:
                  # The action's runtime warns to prefer client-id over
                  # app-id, but its action.yml manifest doesn't (yet)
                  # declare client-id as an input — using it makes
                  # actionlint fail the Lint workflows CI check. Stick
                  # with the (deprecated-but-functional) app-id input
                  # until the manifest catches up. vars.COPILOT_APP_ID
                  # must point at the lolay-nowline-copilot-assign App,
                  # not the release App (a previous mis-set caused
                  # `JSON web token could not be decoded` 401s because
                  # the JWT's iss claim and the signing key were from
                  # different Apps).
                  app-id: ${{ vars.COPILOT_APP_ID }}
                  private-key: ${{ secrets.COPILOT_APP_PRIVATE_KEY }}
                  # Need secrets:write to call `gh secret set` for the
                  # refresh-token rotation below. NOT actions:write — those
                  # are different repo permissions and the /actions/secrets
                  # endpoints check for "Secrets", not "Actions".
                  permission-secrets: write

            - name: Refresh user-to-server token + rotate secret
              id: refresh
              if: steps.existing.outputs.count == '0'
              env:
                  CLIENT_ID: ${{ secrets.COPILOT_APP_CLIENT_ID }}
                  CLIENT_SECRET: ${{ secrets.COPILOT_APP_CLIENT_SECRET }}
                  REFRESH_TOKEN: ${{ secrets.COPILOT_APP_REFRESH_TOKEN }}
                  GH_TOKEN: ${{ steps.app-installation.outputs.token }}
              run: |
                  set -euo pipefail

                  # Exchange the stored refresh token for a fresh pair.
                  # POST body kept in $RESPONSE (memory only); never echoed.
                  RESPONSE=$(curl -sS -X POST https://github.com/login/oauth/access_token \
                      -H "Accept: application/json" \
                      -d "client_id=$CLIENT_ID" \
                      -d "client_secret=$CLIENT_SECRET" \
                      -d "grant_type=refresh_token" \
                      -d "refresh_token=$REFRESH_TOKEN")

                  if ! jq -e 'has("access_token") and has("refresh_token")' <<<"$RESPONSE" >/dev/null; then
                      ERR_CODE=$(jq -r '.error // "unknown"' <<<"$RESPONSE")
                      ERR_DESC=$(jq -r '.error_description // "no description"' <<<"$RESPONSE")
                      echo "::error::refresh exchange failed: $ERR_CODE — $ERR_DESC" >&2
                      echo "::error::stored refresh token may have expired (6mo TTL) or been revoked. Re-do OAuth authorize per CONTRIBUTING.md." >&2
                      exit 1
                  fi

                  NEW_ACCESS=$(jq -r .access_token <<<"$RESPONSE")
                  NEW_REFRESH=$(jq -r .refresh_token <<<"$RESPONSE")

                  # Mask both values in any subsequent logs.
                  echo "::add-mask::$NEW_ACCESS"
                  echo "::add-mask::$NEW_REFRESH"

                  # Rotate the secret BEFORE using the access token. If the
                  # later create-issue step fails we don't want a
                  # one-time-use refresh token consumed by GitHub but never
                  # persisted to our secret store.
                  printf '%s' "$NEW_REFRESH" \
                      | gh secret set COPILOT_APP_REFRESH_TOKEN -R "$GITHUB_REPOSITORY"

                  echo "access_token=$NEW_ACCESS" >> "$GITHUB_OUTPUT"

                  # Drop secrets from this shell before exit.
                  unset RESPONSE NEW_ACCESS NEW_REFRESH

            - name: Create issue + assign to Copilot
              if: steps.existing.outputs.count == '0'
              env:
                  GH_TOKEN: ${{ steps.refresh.outputs.access_token }}
              run: |
                  set -euo pipefail
                  BODY=$(cat .github/copilot-prompts/cursor-engine-sync.md)
                  PAYLOAD=$(jq -n \
                      --arg title "Sync engines.vscode / @types/vscode to Cursor's VS Code engine" \
                      --arg body "$BODY" \
                      '{
                          title: $title,
                          body: $body,
                          labels: ["cursor-engine-sync", "maintenance"],
                          assignees: ["copilot-swe-agent[bot]"]
                      }')
                  gh api \
                      --method POST \
                      -H "Accept: application/vnd.github+json" \
                      -H "X-GitHub-Api-Version: 2022-11-28" \
                      "/repos/$GITHUB_REPOSITORY/issues" \
                      --input - <<< "$PAYLOAD"
