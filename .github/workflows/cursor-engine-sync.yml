name: Cursor engine sync

# Opens a monthly tracking issue assigned to copilot-swe-agent[bot], which
# decides whether to bump engines.vscode and @types/vscode in
# packages/vscode-extension/package.json per the Cursor-tracking policy in
# CONTRIBUTING.md § VS Code extension engine floor policy.
#
# The job is idempotent: if an open issue labelled cursor-engine-sync already
# exists (e.g. the agent's PR is still in review), no second issue is opened.
#
# Authentication — fine-grained PAT
# ----------------------------------------
# Assigning copilot-swe-agent[bot] requires a token associated with a user
# account that has a Copilot Business/Enterprise seat. GitHub's default
# GITHUB_TOKEN lacks the user context. A fine-grained PAT issued by a seated
# user satisfies the constraint and is the simplest possible auth: one
# secret, no rotation, no refresh chain.
#
#   secrets.CURSOR_ENGINE_SYNC_PAT — fine-grained PAT scoped to lolay/nowline
#                                    with `Issues: Read and write`. Issued by
#                                    a user holding a Copilot seat (that user
#                                    becomes the billable identity for the
#                                    Copilot assignment). Renewed annually.
#
# Lineage. We previously used the `lolay-nowline-copilot-assign` App with a
# user-to-server token + refresh-chain (required because Copilot assignment
# needs a user-associated identity, and at the time we wanted to avoid
# attributing automation to a personal account). The non-atomic gap between
# GitHub consuming the old refresh token and us persisting the new one was
# genuinely fragile — a mid-rotation failure broke the chain and required
# interactive recovery via an OAuth helper script. The App-based version was
# last working at commit 08c4533 — see
# `git show 08c4533:.github/workflows/cursor-engine-sync.yml` and
# `git show 08c4533:scripts/refresh-copilot-app-token.sh` if you want to
# study the pattern.

on:
    schedule:
        - cron: "0 12 1 * *"  # 12:00 UTC on the 1st of each month
    workflow_dispatch:

# Serialize runs so a manual dispatch can't race the monthly cron (or
# another manual dispatch) and create duplicate tracking issues. With the
# PAT model the auth itself is no longer rotation-sensitive, but the
# idempotency check (gh issue list) and the create-issue call are still
# two separate API calls — without this block, two parallel runs would
# both see count=0 and both create issues. The original concurrency
# motivation under the App refresh-chain model was different (avoid
# burning the refresh chain on a losing race); the protection happens to
# also cover the duplicate-issue case, which is the only one left now.
#
# cancel-in-progress: false because the first run is already past the
# point of doing useful work (creating the tracking issue) — cancelling
# it would leave us with no issue this cycle. Queue the second run
# instead; it'll detect the now-existing issue at the idempotency
# check step and short-circuit.
concurrency:
    group: cursor-engine-sync
    cancel-in-progress: false

permissions:
    contents: read
    issues: read  # default GITHUB_TOKEN is only used by `gh issue list`; the PAT does the issue create

jobs:
    open-tracking-issue:
        name: Open Cursor engine tracking issue
        runs-on: ubuntu-latest
        steps:
            - name: Checkout (for agent prompt)
              uses: actions/checkout@v6

            - name: Check for existing open issue
              id: existing
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  set -euo pipefail
                  count=$(gh issue list \
                      --repo "$GITHUB_REPOSITORY" \
                      --label "cursor-engine-sync" \
                      --state open \
                      --json number \
                      --jq 'length')
                  echo "count=$count" >> "$GITHUB_OUTPUT"
                  echo "Open cursor-engine-sync issues: $count"

            - name: Create issue + assign to Copilot
              if: steps.existing.outputs.count == '0'
              env:
                  GH_TOKEN: ${{ secrets.CURSOR_ENGINE_SYNC_PAT }}
              run: |
                  set -euo pipefail
                  BODY=$(cat .github/copilot-prompts/cursor-engine-sync.md)
                  PAYLOAD=$(jq -n \
                      --arg title "Sync engines.vscode / @types/vscode to Cursor's VS Code engine" \
                      --arg body "$BODY" \
                      '{
                          title: $title,
                          body: $body,
                          labels: ["cursor-engine-sync", "maintenance"],
                          assignees: ["copilot-swe-agent[bot]"]
                      }')
                  gh api \
                      --method POST \
                      -H "Accept: application/vnd.github+json" \
                      -H "X-GitHub-Api-Version: 2022-11-28" \
                      "/repos/$GITHUB_REPOSITORY/issues" \
                      --input - <<< "$PAYLOAD"
