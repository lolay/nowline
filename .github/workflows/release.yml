name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      level:
        description: 'SemVer bump level'
        type: choice
        required: true
        default: 'patch'
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  cut-release:
    name: Cut release (bump + tag)
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      # Use a PAT (RELEASE_TAG_PAT) instead of GITHUB_TOKEN so the tag
      # push below actually triggers downstream jobs in this same
      # workflow. GITHUB_TOKEN-pushed tags do not trigger workflow_run /
      # push events to avoid recursion; a user-scoped PAT does.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TAG_PAT }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Bump versions
        id: bump
        run: |
          set -euo pipefail
          NEW_VERSION=$(node scripts/bump-version.mjs "${{ inputs.level }}")
          echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Bumped to ${NEW_VERSION}"

      - name: Commit, tag, and push
        env:
          NEW_VERSION: ${{ steps.bump.outputs.version }}
        run: |
          set -euo pipefail
          # nowline.io is the project's canonical domain (matches the
          # attribution mark renderer + ATTRIBUTION_LINK in
          # packages/layout/src/themes/shared.ts). The address does not
          # need to be deliverable — git only stores it as a string —
          # but pointing at the project domain keeps the trail
          # consistent.
          git config user.name "nowline-release-bot"
          git config user.email "release-bot@nowline.io"
          git add packages/*/package.json
          git commit -m "release v${NEW_VERSION}"
          git tag "v${NEW_VERSION}"
          git push origin HEAD
          git push origin "v${NEW_VERSION}"

  build-binaries:
    name: Build ${{ matrix.target }}
    # Skip on workflow_dispatch — cut-release runs alone, then the tag
    # push it produces fires this whole workflow again under
    # `event_name == 'push'`, which is when builds + publishes execute.
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { runner: macos-latest, target: bun-darwin-arm64, suffix: macos-arm64 }
          - { runner: macos-latest, target: bun-darwin-x64, suffix: macos-x64 }
          - { runner: ubuntu-latest, target: bun-linux-x64, suffix: linux-x64 }
          - { runner: ubuntu-latest, target: bun-linux-arm64, suffix: linux-arm64 }
          - { runner: windows-latest, target: bun-windows-x64, suffix: windows-x64.exe }
          - { runner: windows-latest, target: bun-windows-arm64, suffix: windows-arm64.exe }
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm -r build

      - name: Compile binary
        working-directory: packages/cli
        run: node scripts/compile.mjs --target=${{ matrix.target }}

      - name: Smoke test binary (render every format)
        if: matrix.runner != 'windows-latest'
        shell: bash
        run: |
          set -euo pipefail
          bin=packages/cli/dist-bin/nowline-${{ matrix.suffix }}
          if [[ "${{ matrix.runner }}" == "macos-latest" && "${{ matrix.target }}" != *"darwin"* ]]; then
            echo "cross-target binary; skipping execution smoke"
            exit 0
          fi
          if [[ "${{ matrix.runner }}" == "ubuntu-latest" && "${{ matrix.target }}" != *"linux-x64"* ]]; then
            echo "cross-target binary; skipping execution smoke"
            exit 0
          fi
          chmod +x "$bin"
          "$bin" --version
          "$bin" examples/minimal.nowline -o - > /tmp/minimal.svg
          head -c 4 /tmp/minimal.svg | grep -q "<svg"
          "$bin" examples/minimal.nowline -f png --headless -o /tmp/minimal.png
          head -c 4 /tmp/minimal.png | od -An -c | grep -q 'P   N   G'
          "$bin" examples/minimal.nowline -f pdf --headless -o /tmp/minimal.pdf
          "$bin" examples/minimal.nowline -f html -o /tmp/minimal.html
          "$bin" examples/minimal.nowline -f mermaid -o /tmp/minimal.md
          "$bin" examples/minimal.nowline -f xlsx -o /tmp/minimal.xlsx
          "$bin" examples/minimal.nowline -f msproj -o /tmp/minimal.xml
          for f in /tmp/minimal.svg /tmp/minimal.png /tmp/minimal.pdf /tmp/minimal.html /tmp/minimal.md /tmp/minimal.xlsx /tmp/minimal.xml; do
            test -s "$f" || { echo "empty: $f" >&2; exit 1; }
          done

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: nowline-${{ matrix.suffix }}
          path: packages/cli/dist-bin/nowline-${{ matrix.suffix }}
          if-no-files-found: error

  build-deb:
    name: Build .deb (${{ matrix.arch }})
    runs-on: ubuntu-latest
    needs: build-binaries
    strategy:
      matrix:
        include:
          - { arch: amd64, suffix: linux-x64 }
          - { arch: arm64, suffix: linux-arm64 }
    steps:
      - uses: actions/checkout@v4

      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: nowline-${{ matrix.suffix }}
          path: dist-bin

      - name: Build .deb
        run: bash scripts/build-deb.sh "${{ matrix.arch }}" "dist-bin/nowline-${{ matrix.suffix }}" "${GITHUB_REF_NAME#v}"

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: nowline_${{ matrix.arch }}.deb
          path: dist-deb/nowline_*_${{ matrix.arch }}.deb
          if-no-files-found: error

  publish-npm:
    name: Publish npm packages
    runs-on: ubuntu-latest
    needs: build-binaries
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm -r build

      # Publish in dependency order: core layers first, then export-core,
      # then per-format export packages, then the CLI.

      - name: Publish @nowline/core
        working-directory: packages/core
        run: pnpm publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @nowline/layout
        working-directory: packages/layout
        run: pnpm publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @nowline/renderer
        working-directory: packages/renderer
        run: pnpm publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @nowline/export-core
        working-directory: packages/export-core
        run: pnpm publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @nowline/export-png
        working-directory: packages/export-png
        run: pnpm publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @nowline/export-pdf
        working-directory: packages/export-pdf
        run: pnpm publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @nowline/export-html
        working-directory: packages/export-html
        run: pnpm publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @nowline/export-mermaid
        working-directory: packages/export-mermaid
        run: pnpm publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @nowline/export-xlsx
        working-directory: packages/export-xlsx
        run: pnpm publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @nowline/export-msproj
        working-directory: packages/export-msproj
        run: pnpm publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @nowline/cli
        working-directory: packages/cli
        run: pnpm publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-vscode:
    name: Publish VS Code extension
    runs-on: ubuntu-latest
    needs: publish-npm
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm -r build

      - name: Package .vsix
        working-directory: packages/vscode-extension
        run: pnpm package

      - name: Publish to VS Code Marketplace
        working-directory: packages/vscode-extension
        # No `--pre-release`: per specs/releasing.md we ship every tag as
        # a stable release. Marketplace doesn't accept SemVer pre-release
        # suffixes (e.g. `0.1.0-rc.1`) so we don't try to model an RC
        # channel. Revisit at 1.0.
        run: npx --yes @vscode/vsce publish --packagePath dist/nowline-vscode.vsix
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Publish to Open VSX
        working-directory: packages/vscode-extension
        run: npx --yes ovsx publish dist/nowline-vscode.vsix -p $OVSX_PAT
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [build-binaries, build-deb]
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Stage release assets
        run: |
          mkdir -p release-assets
          find artifacts -type f \( -name 'nowline-*' -o -name '*.deb' \) -exec cp {} release-assets/ \;
          cp packages/cli/man/nowline.1 release-assets/
          ls -la release-assets

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true

  update-homebrew-tap:
    name: Update Homebrew tap
    runs-on: ubuntu-latest
    needs: release
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          path: src

      - name: Checkout lolay/homebrew-tap
        uses: actions/checkout@v4
        with:
          # Brew tap shorthand `lolay/tap` (used in `brew install
          # lolay/tap/nowline`) maps to the GitHub repo
          # `lolay/homebrew-tap` — Homebrew strips the `homebrew-`
          # prefix only inside its own tooling. actions/checkout needs
          # the literal repo name.
          repository: lolay/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Download macOS/Linux binaries
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Compute SHA256s and update formula
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          # Fail loudly if any expected artifact is missing — without this
          # guard, a missing download produces an all-zero SHA and a
          # broken formula gets pushed to the tap.
          required=(
            "src/packages/cli/man/nowline.1"
            "artifacts/nowline-macos-arm64/nowline-macos-arm64"
            "artifacts/nowline-macos-x64/nowline-macos-x64"
            "artifacts/nowline-linux-x64/nowline-linux-x64"
            "artifacts/nowline-linux-arm64/nowline-linux-arm64"
          )
          for f in "${required[@]}"; do
            test -s "$f" || { echo "missing or empty artifact: $f" >&2; exit 1; }
          done
          SHA_MANPAGE=$(sha256sum src/packages/cli/man/nowline.1 | awk '{print $1}')
          cd artifacts
          SHA_DARWIN_ARM64=$(sha256sum nowline-macos-arm64/nowline-macos-arm64 | awk '{print $1}')
          SHA_DARWIN_X64=$(sha256sum nowline-macos-x64/nowline-macos-x64 | awk '{print $1}')
          SHA_LINUX_X64=$(sha256sum nowline-linux-x64/nowline-linux-x64 | awk '{print $1}')
          SHA_LINUX_ARM64=$(sha256sum nowline-linux-arm64/nowline-linux-arm64 | awk '{print $1}')
          cd ../tap
          mkdir -p Formula
          cat > Formula/nowline.rb <<EOF
          class Nowline < Formula
            desc "Parse, validate, and convert .nowline roadmap files"
            homepage "https://github.com/lolay/nowline"
            version "${VERSION}"
            license "Apache-2.0"

            livecheck do
              url :stable
              strategy :github_latest
            end

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/lolay/nowline/releases/download/v${VERSION}/nowline-macos-arm64"
                sha256 "${SHA_DARWIN_ARM64}"
              else
                url "https://github.com/lolay/nowline/releases/download/v${VERSION}/nowline-macos-x64"
                sha256 "${SHA_DARWIN_X64}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/lolay/nowline/releases/download/v${VERSION}/nowline-linux-arm64"
                sha256 "${SHA_LINUX_ARM64}"
              else
                url "https://github.com/lolay/nowline/releases/download/v${VERSION}/nowline-linux-x64"
                sha256 "${SHA_LINUX_X64}"
              end
            end

            resource "manpage" do
              url "https://github.com/lolay/nowline/releases/download/v${VERSION}/nowline.1"
              sha256 "${SHA_MANPAGE}"
            end

            def install
              bin.install Dir["nowline-*"].first => "nowline"
              resource("manpage").stage { man1.install "nowline.1" }
            end

            test do
              system "#{bin}/nowline", "--version"
            end
          end
          EOF

          git config user.name "nowline-release-bot"
          git config user.email "release-bot@nowline.io"
          git add Formula/nowline.rb
          git commit -m "nowline ${VERSION}"
          git push origin HEAD
