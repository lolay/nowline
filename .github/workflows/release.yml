name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      level:
        description: 'SemVer bump level'
        type: choice
        required: true
        default: 'patch'
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

# Workflow-level git identity for every `git commit` made by this
# workflow (cut-release commits the version bump; the github-release
# cell commits the Homebrew tap formula). git honours these env vars
# without needing per-step `git config user.name/email`. nowline.io is
# the project's canonical domain (matches the attribution mark in
# packages/layout/src/themes/shared.ts); it doesn't need to be a
# deliverable mailbox — git just stores it as a string.
env:
  GIT_AUTHOR_NAME: nowline-release-bot
  GIT_AUTHOR_EMAIL: release-bot@nowline.io
  GIT_COMMITTER_NAME: nowline-release-bot
  GIT_COMMITTER_EMAIL: release-bot@nowline.io

jobs:
  cut-release:
    name: Cut release (bump + tag)
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      # Use a PAT (RELEASE_TAG_PAT) instead of GITHUB_TOKEN so the tag
      # push below actually triggers downstream jobs in this same
      # workflow. GITHUB_TOKEN-pushed tags do not trigger workflow_run /
      # push events to avoid recursion; a user-scoped PAT does.
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TAG_PAT }}

      - uses: ./.github/actions/setup-node-pnpm

      - name: Bump versions
        id: bump
        run: |
          set -euo pipefail
          NEW_VERSION=$(node scripts/bump-version.mjs "${{ inputs.level }}")
          echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Bumped to ${NEW_VERSION}"

      - name: Commit, tag, and push
        env:
          NEW_VERSION: ${{ steps.bump.outputs.version }}
        run: |
          set -euo pipefail
          git add packages/*/package.json
          git commit -m "release v${NEW_VERSION}"
          git tag "v${NEW_VERSION}"
          git push origin HEAD
          git push origin "v${NEW_VERSION}"

  # Phase 1 — pack everything in parallel.
  #
  # One job, one matrix, eight cells. Heterogeneous on purpose so the
  # publish phase can do `needs: build` and inherit "wait for every
  # cell" gating from GitHub Actions for free — no separate gate job.
  #
  # Cell layout:
  #   bin-* (×6)    Compile a `bun compile` binary for one os/arch. The
  #                 two linux cells additionally build their .deb on the
  #                 same runner (gated on `matrix.deb_arch`) so the
  #                 binary -> deb chain stays intra-cell, with no
  #                 artifact upload/download round-trip between jobs.
  #   pack-npm      `pnpm pack` the eleven publishable packages in
  #                 dependency order. pnpm 10 rewrites `workspace:*` to
  #                 the resolved version inside the tarballs, so the
  #                 publish phase can use plain `npm publish <tarball>`.
  #   pack-vsix     `pnpm package` for the VS Code extension (esbuild
  #                 bundle + `vsce package --no-dependencies`).
  build:
    name: Build ${{ matrix.id }}
    # Skip on workflow_dispatch — cut-release runs alone, then the tag
    # push it produces fires this whole workflow again under
    # `event_name == 'push'`, which is when builds + publishes execute.
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { id: bin-macos-arm64, kind: binary, runner: macos-latest, target: bun-darwin-arm64, suffix: macos-arm64 }
          - { id: bin-macos-x64, kind: binary, runner: macos-latest, target: bun-darwin-x64, suffix: macos-x64 }
          - { id: bin-linux-x64, kind: binary, runner: ubuntu-latest, target: bun-linux-x64, suffix: linux-x64, deb_arch: amd64 }
          - { id: bin-linux-arm64, kind: binary, runner: ubuntu-latest, target: bun-linux-arm64, suffix: linux-arm64, deb_arch: arm64 }
          - { id: bin-windows-x64, kind: binary, runner: windows-latest, target: bun-windows-x64, suffix: windows-x64.exe }
          - { id: bin-windows-arm64, kind: binary, runner: windows-latest, target: bun-windows-arm64, suffix: windows-arm64.exe }
          - { id: pack-npm, kind: npm-pack, runner: ubuntu-latest }
          - { id: pack-vsix, kind: vsix-pack, runner: ubuntu-latest }
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node-pnpm

      - name: Install Bun
        if: matrix.kind == 'binary'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # `pnpm install` in setup-node-pnpm respects the host's os/cpu and
      # only installs optionalDependencies matching the host (e.g. on a
      # macOS-arm64 runner, only `@resvg/resvg-js-darwin-arm64` lands).
      # When `bun build --compile --target=bun-darwin-x64` then bundles
      # the binary, the `require('@resvg/resvg-js-darwin-x64')` line in
      # resvg-js's runtime loader (js-binding.js) resolves to nothing,
      # so the shipped binary crashes the first time a user runs
      # `nowline -f png`. Re-install with --cpu/--os (pnpm 10.14+) to
      # additionally pull the *target's* native binding alongside the
      # host's. Bun then embeds only the target-arch .node into the
      # compiled binary; the host arch's binding stays on disk so any
      # workspace tooling that needs it (esbuild, biome, etc.) keeps
      # working. Installing all 12 platform variants would balloon the
      # binary by ~30 MB because bun cannot statically eliminate the
      # unreachable switch branches once their require targets resolve.
      - name: Install target-platform native deps for bun --compile
        if: matrix.kind == 'binary'
        shell: bash
        run: |
          set -euo pipefail
          case "${{ matrix.target }}" in
            bun-darwin-arm64)  TGT_OS=darwin;  TGT_CPU=arm64 ;;
            bun-darwin-x64)    TGT_OS=darwin;  TGT_CPU=x64 ;;
            bun-linux-x64)     TGT_OS=linux;   TGT_CPU=x64 ;;
            bun-linux-arm64)   TGT_OS=linux;   TGT_CPU=arm64 ;;
            bun-windows-x64)   TGT_OS=win32;   TGT_CPU=x64 ;;
            bun-windows-arm64) TGT_OS=win32;   TGT_CPU=arm64 ;;
            *) echo "unknown target: ${{ matrix.target }}" >&2; exit 1 ;;
          esac
          HOST_OS=$(node -e "console.log({darwin:'darwin',linux:'linux',win32:'win32'}[process.platform])")
          HOST_CPU=$(node -e "console.log(process.arch)")
          pnpm install --frozen-lockfile \
            --cpu="$HOST_CPU" --cpu="$TGT_CPU" \
            --os="$HOST_OS" --os="$TGT_OS"

      - name: Build
        run: pnpm -r build

      # ===== binary cells =====

      # Belt-and-suspenders: assert the target's native resvg binding is
      # resolvable from inside the resvg-js parent before `bun --compile`.
      # `bin-linux-arm64` and `bin-windows-arm64` are never executed in
      # CI (no qemu, no Windows-on-ARM runner), so without this gate a
      # regression in the install step above would silently ship broken
      # binaries that fail at the user's first `-f png`.
      #
      # We resolve from the resvg-js parent because pnpm only symlinks
      # the host-arch optional dep into top-level node_modules; the
      # cross-arch variants live under `node_modules/.pnpm/.../resvg-js/
      # node_modules/@resvg/`, which is what bun's bundler walks.
      - name: Verify target native deps present
        if: matrix.kind == 'binary'
        shell: bash
        # Run from packages/export-png because that's the only workspace
        # package that depends on `@resvg/resvg-js`; the dep isn't hoisted
        # to the repo root, so `require.resolve('@resvg/resvg-js/...')`
        # only succeeds from inside export-png's resolution scope.
        working-directory: packages/export-png
        run: |
          set -euo pipefail
          case "${{ matrix.target }}" in
            bun-darwin-arm64)  REQUIRED="@resvg/resvg-js-darwin-arm64" ;;
            bun-darwin-x64)    REQUIRED="@resvg/resvg-js-darwin-x64" ;;
            bun-linux-x64)     REQUIRED="@resvg/resvg-js-linux-x64-gnu" ;;
            bun-linux-arm64)   REQUIRED="@resvg/resvg-js-linux-arm64-gnu" ;;
            bun-windows-x64)   REQUIRED="@resvg/resvg-js-win32-x64-msvc" ;;
            bun-windows-arm64) REQUIRED="@resvg/resvg-js-win32-arm64-msvc" ;;
            *) echo "unknown target: ${{ matrix.target }}" >&2; exit 1 ;;
          esac
          REQUIRED="$REQUIRED" node -e "
            const Module = require('module');
            const resvgPkg = require.resolve('@resvg/resvg-js/package.json');
            const req = Module.createRequire(resvgPkg);
            const required = process.env.REQUIRED;
            try {
              const r = req.resolve(required + '/package.json');
              console.log('ok:', required, '->', r);
            } catch (e) {
              console.error('ERROR:', required, 'is not resolvable from', resvgPkg);
              console.error('bun --compile --target=${{ matrix.target }} would ship a broken binary');
              process.exit(1);
            }
          "

      # Pre-download the target's bun runtime tarball directly into bun's
      # cache. Works around a known cross-drive bug in `bun --compile`: on
      # GitHub Actions Windows runners the workspace lives on D:\ while
      # bun's cache lives on C:\, so bun's "download to temp dir then
      # rename into cache" path fails with EXDEV and surfaces as
      #   Failed to extract executable for 'bun-windows-aarch64-vX.Y.Z'.
      #   The download may be incomplete.
      # See https://github.com/oven-sh/bun/issues/25346 and
      # https://github.com/oven-sh/bun/issues/28327. Curl-into-cache
      # sidesteps the buggy rename. Native cells (target == host) and
      # repeat runs short-circuit on the cache-hit check, so this step
      # is cheap when not strictly needed.
      - name: Pre-cache bun cross-compile target
        if: matrix.kind == 'binary'
        shell: bash
        run: |
          set -euo pipefail
          BUN_VERSION=$(bun --version)
          case "${{ matrix.target }}" in
            bun-darwin-arm64)  BUN_PLATFORM=darwin-aarch64;  BUN_BIN=bun ;;
            bun-darwin-x64)    BUN_PLATFORM=darwin-x64;      BUN_BIN=bun ;;
            bun-linux-arm64)   BUN_PLATFORM=linux-aarch64;   BUN_BIN=bun ;;
            bun-linux-x64)     BUN_PLATFORM=linux-x64;       BUN_BIN=bun ;;
            bun-windows-arm64) BUN_PLATFORM=windows-aarch64; BUN_BIN=bun.exe ;;
            bun-windows-x64)   BUN_PLATFORM=windows-x64;     BUN_BIN=bun.exe ;;
            *) echo "unknown target: ${{ matrix.target }}" >&2; exit 1 ;;
          esac
          CACHE_DIR=$(bun pm cache)
          CACHE_DEST="${CACHE_DIR}/bun-${BUN_PLATFORM}-v${BUN_VERSION}"
          if [[ -f "$CACHE_DEST" ]]; then
            echo "ok: bun-${BUN_PLATFORM}-v${BUN_VERSION} already cached at ${CACHE_DEST}"
            exit 0
          fi
          URL="https://registry.npmjs.org/@oven/bun-${BUN_PLATFORM}/-/bun-${BUN_PLATFORM}-${BUN_VERSION}.tgz"
          echo "fetching ${URL}"
          mkdir -p "$CACHE_DIR"
          TMP=$(mktemp -d)
          curl -fsSL --retry 5 --retry-delay 5 "$URL" | tar -xzf - -C "$TMP"
          if [[ -f "${TMP}/package/bin/${BUN_BIN}" ]]; then
            cp "${TMP}/package/bin/${BUN_BIN}" "$CACHE_DEST"
          elif [[ -f "${TMP}/package/${BUN_BIN}" ]]; then
            cp "${TMP}/package/${BUN_BIN}" "$CACHE_DEST"
          else
            echo "ERROR: ${BUN_BIN} not found in tarball; contents:" >&2
            find "$TMP" -type f >&2
            exit 1
          fi
          chmod +x "$CACHE_DEST" 2>/dev/null || true
          ls -lh "$CACHE_DEST"

      - name: Compile binary
        if: matrix.kind == 'binary'
        working-directory: packages/cli
        run: node scripts/compile.mjs --target=${{ matrix.target }}

      - name: Smoke test binary (render every format)
        if: matrix.kind == 'binary' && matrix.runner != 'windows-latest'
        shell: bash
        env:
          MATRIX_RUNNER: ${{ matrix.runner }}
          MATRIX_TARGET: ${{ matrix.target }}
          MATRIX_SUFFIX: ${{ matrix.suffix }}
        run: |
          set -euo pipefail
          BIN="packages/cli/dist-bin/nowline-${MATRIX_SUFFIX}"
          EXAMPLE=examples/minimal.nowline
          OUT="${RUNNER_TEMP:-/tmp}/minimal"
          if [[ "$MATRIX_RUNNER" == "macos-latest" && "$MATRIX_TARGET" != *darwin* ]]; then
            echo "cross-target binary; skipping execution smoke"
            exit 0
          fi
          if [[ "$MATRIX_RUNNER" == "ubuntu-latest" && "$MATRIX_TARGET" != *linux-x64* ]]; then
            echo "cross-target binary; skipping execution smoke"
            exit 0
          fi
          chmod +x "$BIN"
          "$BIN" --version
          "$BIN" "$EXAMPLE" -o - > "$OUT.svg"
          head -c 4 "$OUT.svg" | grep -q "<svg"
          "$BIN" "$EXAMPLE" -f png --headless -o "$OUT.png"
          head -c 4 "$OUT.png" | od -An -c | grep -q 'P   N   G'
          "$BIN" "$EXAMPLE" -f pdf --headless -o "$OUT.pdf"
          "$BIN" "$EXAMPLE" -f html -o "$OUT.html"
          "$BIN" "$EXAMPLE" -f mermaid -o "$OUT.md"
          "$BIN" "$EXAMPLE" -f xlsx -o "$OUT.xlsx"
          "$BIN" "$EXAMPLE" -f msproj -o "$OUT.xml"
          for ext in svg png pdf html md xlsx xml; do
            test -s "$OUT.$ext" || { echo "empty: $OUT.$ext" >&2; exit 1; }
          done

      - name: Upload binary artifact
        if: matrix.kind == 'binary'
        uses: actions/upload-artifact@v7
        with:
          name: nowline-${{ matrix.suffix }}
          path: packages/cli/dist-bin/nowline-${{ matrix.suffix }}
          if-no-files-found: error

      - name: Build .deb
        if: matrix.deb_arch
        run: bash scripts/build-deb.sh "${{ matrix.deb_arch }}" "packages/cli/dist-bin/nowline-${{ matrix.suffix }}" "${GITHUB_REF_NAME#v}"

      - name: Upload .deb artifact
        if: matrix.deb_arch
        uses: actions/upload-artifact@v7
        with:
          name: nowline_${{ matrix.deb_arch }}.deb
          path: dist-deb/nowline_*_${{ matrix.deb_arch }}.deb
          if-no-files-found: error

      # ===== pack-npm cell =====

      - name: Pack npm tarballs
        if: matrix.kind == 'npm-pack'
        run: |
          set -euo pipefail
          mkdir -p dist-pack
          # Dependency order: core layers first, then export-core,
          # then per-format export packages, then the CLI. pnpm pack
          # rewrites `workspace:*` to the actual version inside each
          # produced .tgz, so the publish phase doesn't need pnpm.
          for pkg in \
              packages/core \
              packages/layout \
              packages/renderer \
              packages/embed \
              packages/export-core \
              packages/export-png \
              packages/export-pdf \
              packages/export-html \
              packages/export-mermaid \
              packages/export-xlsx \
              packages/export-msproj \
              packages/cli; do
            (cd "$pkg" && pnpm pack --pack-destination "$GITHUB_WORKSPACE/dist-pack")
          done
          ls -la dist-pack

      - name: Upload npm tarballs
        if: matrix.kind == 'npm-pack'
        uses: actions/upload-artifact@v7
        with:
          name: npm-tarballs
          path: dist-pack/*.tgz
          if-no-files-found: error

      # ===== pack-vsix cell =====

      - name: Package .vsix
        if: matrix.kind == 'vsix-pack'
        working-directory: packages/vscode-extension
        run: pnpm package

      - name: Upload .vsix
        if: matrix.kind == 'vsix-pack'
        uses: actions/upload-artifact@v7
        with:
          name: nowline-vscode.vsix
          path: packages/vscode-extension/dist/nowline-vscode.vsix
          if-no-files-found: error

  # Phase 2 — publish to every external registry.
  #
  # `needs: build` means GitHub Actions waits for every cell of the
  # build matrix to succeed before starting any cell here. That's the
  # built-in gate — no no-op job required.
  #
  # Cells download only what they need, then push. No `pnpm install`,
  # no `pnpm -r build`, no source checkout in the npm and vscode cells
  # — those are pure download + push.
  #
  # The github-release cell also commits the Homebrew tap formula at
  # the end of the same job, on the same runner, so the tap commit
  # fires right after the GH release publish without waiting on the
  # npm or vscode cells. Matrix cells can't depend on each other (no
  # intra-matrix `needs:`), and the formula references release-asset
  # URLs that have to resolve before they're committed, so chaining
  # the tap inside the cell is the only way to keep this in the matrix.
  publish:
    name: Publish ${{ matrix.id }}
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    needs: build
    runs-on: ubuntu-latest
    strategy:
      # A flaky npm publish must not cancel an in-flight Marketplace
      # publish or the github-release/tap cell. Partial failures still
      # need to be inspected and re-run individually, but neither
      # registry should hold the others hostage.
      fail-fast: false
      matrix:
        include:
          - { id: npm, kind: npm }
          - { id: vscode, kind: vscode }
          - { id: github-release, kind: github-release }
    steps:
      - name: Setup Node.js
        if: matrix.kind == 'npm' || matrix.kind == 'vscode'
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      # ===== npm cell =====

      - name: Download npm tarballs
        if: matrix.kind == 'npm'
        uses: actions/download-artifact@v8
        with:
          name: npm-tarballs
          path: dist-pack

      - name: Publish to npm (dependency order)
        if: matrix.kind == 'npm'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          # `pnpm pack` strips the `@` scope and joins with `-`, so
          # `@nowline/core` → `nowline-core-<version>.tgz`. Same
          # dependency order as the pack step.
          for pkg in nowline-core nowline-layout nowline-renderer nowline-embed nowline-export-core nowline-export-png nowline-export-pdf nowline-export-html nowline-export-mermaid nowline-export-xlsx nowline-export-msproj nowline-cli; do
            tarball=$(find dist-pack -maxdepth 1 -name "${pkg}-*.tgz" -print -quit)
            test -n "$tarball" || { echo "missing tarball for ${pkg}" >&2; exit 1; }
            echo "publishing ${tarball}"
            # `./` prefix forces npm to treat the argument as a filesystem
            # path. Without it, npm 11+ sees `dist-pack/<name>.tgz`, treats
            # the slash as an `org/repo` GitHub spec, and tries to git-clone
            # over SSH — which fails with "Permission denied (publickey)".
            npm publish "./$tarball" --access public
          done

      # ===== vscode cell =====

      - name: Download .vsix
        if: matrix.kind == 'vscode'
        uses: actions/download-artifact@v8
        with:
          name: nowline-vscode.vsix
          path: dist-vsix

      - name: Publish to VS Code Marketplace
        if: matrix.kind == 'vscode'
        # No `--pre-release`: per specs/releasing.md we ship every tag
        # as a stable release. Marketplace doesn't accept SemVer
        # pre-release suffixes (e.g. `0.1.0-rc.1`) so we don't try to
        # model an RC channel. Revisit at 1.0.
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npx --yes @vscode/vsce publish --packagePath dist-vsix/nowline-vscode.vsix

      - name: Publish to Open VSX
        if: matrix.kind == 'vscode'
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: npx --yes ovsx publish dist-vsix/nowline-vscode.vsix -p "$OVSX_PAT"

      # ===== github-release cell (also commits the Homebrew tap) =====

      - name: Checkout source
        if: matrix.kind == 'github-release'
        uses: actions/checkout@v6
        with:
          path: src

      - name: Checkout lolay/homebrew-tap
        if: matrix.kind == 'github-release'
        uses: actions/checkout@v6
        with:
          # Brew tap shorthand `lolay/tap` (used in `brew install
          # lolay/tap/nowline`) maps to the GitHub repo
          # `lolay/homebrew-tap` — Homebrew strips the `homebrew-`
          # prefix only inside its own tooling. actions/checkout needs
          # the literal repo name.
          repository: lolay/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Download binary artifacts
        if: matrix.kind == 'github-release'
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: 'nowline-{macos,linux,windows}-*'

      - name: Download .deb artifacts
        if: matrix.kind == 'github-release'
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: 'nowline_*.deb'

      - name: Stage release assets
        if: matrix.kind == 'github-release'
        run: |
          set -euo pipefail
          mkdir -p release-assets
          find artifacts -type f \( -name 'nowline-*' -o -name '*.deb' \) -exec cp {} release-assets/ \;
          cp src/packages/cli/man/nowline.1 release-assets/
          cp src/packages/cli/man/nowline.5 release-assets/
          # Translated man pages flatten to nowline.<locale>.<section> in the
          # release assets so the URLs stay predictable. Each section is gated
          # independently so a locale that translates only one section still
          # ships cleanly. Loop runs zero times when no overlay directories
          # exist, so adding a new locale is a pure-data drop with no
          # workflow change.
          for d in src/packages/cli/man/*/; do
            [ -d "$d" ] || continue
            locale="$(basename "$d")"
            srcfile1="${d}nowline.1"
            srcfile5="${d}nowline.5"
            [ -f "$srcfile1" ] && cp "$srcfile1" "release-assets/nowline.${locale}.1"
            [ -f "$srcfile5" ] && cp "$srcfile5" "release-assets/nowline.${locale}.5"
          done
          ls -la release-assets

      - name: Publish GitHub Release
        if: matrix.kind == 'github-release'
        uses: softprops/action-gh-release@v3
        with:
          files: release-assets/*
          generate_release_notes: true

      - name: Compute SHA256s and update Homebrew formula
        if: matrix.kind == 'github-release'
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          # Fail loudly if any expected artifact is missing — without this
          # guard, a missing download produces an all-zero SHA and a
          # broken formula gets pushed to the tap.
          required=(
            "src/packages/cli/man/nowline.1"
            "src/packages/cli/man/nowline.5"
            "artifacts/nowline-macos-arm64/nowline-macos-arm64"
            "artifacts/nowline-macos-x64/nowline-macos-x64"
            "artifacts/nowline-linux-x64/nowline-linux-x64"
            "artifacts/nowline-linux-arm64/nowline-linux-arm64"
          )
          for f in "${required[@]}"; do
            test -s "$f" || { echo "missing or empty artifact: $f" >&2; exit 1; }
          done
          SHA_MANPAGE=$(sha256sum src/packages/cli/man/nowline.1 | awk '{print $1}')
          SHA_MANPAGE5=$(sha256sum src/packages/cli/man/nowline.5 | awk '{print $1}')
          cd artifacts
          SHA_DARWIN_ARM64=$(sha256sum nowline-macos-arm64/nowline-macos-arm64 | awk '{print $1}')
          SHA_DARWIN_X64=$(sha256sum nowline-macos-x64/nowline-macos-x64 | awk '{print $1}')
          SHA_LINUX_X64=$(sha256sum nowline-linux-x64/nowline-linux-x64 | awk '{print $1}')
          SHA_LINUX_ARM64=$(sha256sum nowline-linux-arm64/nowline-linux-arm64 | awk '{print $1}')
          cd ..

          # Discover locale overlays and emit the matching `resource` /
          # `man.install` lines for each section that has a translation. The
          # empty overlay case (no files under packages/cli/man/<locale>/)
          # skips both blocks cleanly. Each section is gated independently
          # so a locale that translates only one section still ships
          # cleanly.
          MAN_RESOURCES=""
          MAN_INSTALL=""
          for d in src/packages/cli/man/*/; do
            [ -d "$d" ] || continue
            locale="$(basename "$d")"

            srcfile1="${d}nowline.1"
            if [ -f "$srcfile1" ]; then
              sha=$(sha256sum "$srcfile1" | awk '{print $1}')
              res_name="manpage-${locale}"
              asset="nowline.${locale}.1"
              MAN_RESOURCES+="
            resource \"${res_name}\" do
              url \"https://github.com/lolay/nowline/releases/download/v${VERSION}/${asset}\"
              sha256 \"${sha}\"
            end
          "
              MAN_INSTALL+="
              resource(\"${res_name}\").stage { (share/\"man/${locale}/man1\").install \"${asset}\" => \"nowline.1\" }"
            fi

            srcfile5="${d}nowline.5"
            if [ -f "$srcfile5" ]; then
              sha=$(sha256sum "$srcfile5" | awk '{print $1}')
              res_name="manpage-${locale}-5"
              asset="nowline.${locale}.5"
              MAN_RESOURCES+="
            resource \"${res_name}\" do
              url \"https://github.com/lolay/nowline/releases/download/v${VERSION}/${asset}\"
              sha256 \"${sha}\"
            end
          "
              MAN_INSTALL+="
              resource(\"${res_name}\").stage { (share/\"man/${locale}/man5\").install \"${asset}\" => \"nowline.5\" }"
            fi
          done

          cd tap
          mkdir -p Formula
          cat > Formula/nowline.rb <<EOF
          class Nowline < Formula
            desc "Parse, validate, and convert .nowline roadmap files"
            homepage "https://github.com/lolay/nowline"
            version "${VERSION}"
            license "Apache-2.0"

            livecheck do
              url :stable
              strategy :github_latest
            end

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/lolay/nowline/releases/download/v${VERSION}/nowline-macos-arm64"
                sha256 "${SHA_DARWIN_ARM64}"
              else
                url "https://github.com/lolay/nowline/releases/download/v${VERSION}/nowline-macos-x64"
                sha256 "${SHA_DARWIN_X64}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/lolay/nowline/releases/download/v${VERSION}/nowline-linux-arm64"
                sha256 "${SHA_LINUX_ARM64}"
              else
                url "https://github.com/lolay/nowline/releases/download/v${VERSION}/nowline-linux-x64"
                sha256 "${SHA_LINUX_X64}"
              end
            end

            resource "manpage" do
              url "https://github.com/lolay/nowline/releases/download/v${VERSION}/nowline.1"
              sha256 "${SHA_MANPAGE}"
            end

            resource "manpage5" do
              url "https://github.com/lolay/nowline/releases/download/v${VERSION}/nowline.5"
              sha256 "${SHA_MANPAGE5}"
            end
          ${MAN_RESOURCES}
            def install
              bin.install Dir["nowline-*"].first => "nowline"
              resource("manpage").stage { man1.install "nowline.1" }
              resource("manpage5").stage { man5.install "nowline.5" }${MAN_INSTALL}
            end

            test do
              system "#{bin}/nowline", "--version"
            end
          end
          EOF

          git add Formula/nowline.rb
          git commit -m "nowline ${VERSION}"
          git push origin HEAD
