name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-binaries:
    name: Build ${{ matrix.target }} (${{ matrix.variant }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { variant: tiny, runner: macos-latest, target: bun-darwin-arm64, suffix: macos-arm64 }
          - { variant: tiny, runner: macos-latest, target: bun-darwin-x64, suffix: macos-x64 }
          - { variant: tiny, runner: ubuntu-latest, target: bun-linux-x64, suffix: linux-x64 }
          - { variant: tiny, runner: ubuntu-latest, target: bun-linux-arm64, suffix: linux-arm64 }
          - { variant: tiny, runner: windows-latest, target: bun-windows-x64, suffix: windows-x64.exe }
          - { variant: tiny, runner: windows-latest, target: bun-windows-arm64, suffix: windows-arm64.exe }
          - { variant: full, runner: macos-latest, target: bun-darwin-arm64, suffix: macos-arm64 }
          - { variant: full, runner: macos-latest, target: bun-darwin-x64, suffix: macos-x64 }
          - { variant: full, runner: ubuntu-latest, target: bun-linux-x64, suffix: linux-x64 }
          - { variant: full, runner: ubuntu-latest, target: bun-linux-arm64, suffix: linux-arm64 }
          - { variant: full, runner: windows-latest, target: bun-windows-x64, suffix: windows-x64.exe }
          - { variant: full, runner: windows-latest, target: bun-windows-arm64, suffix: windows-arm64.exe }
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm -r build

      - name: Compile binary
        working-directory: packages/cli
        run: node scripts/compile.mjs --target=${{ matrix.target }} --variant=${{ matrix.variant }}

      - name: Resolve binary name
        id: bin
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ matrix.variant }}" == "full" ]]; then
            echo "name=nowline-full-${{ matrix.suffix }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=nowline-${{ matrix.suffix }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Smoke test binary (tiny — render SVG/PNG, reject PDF)
        if: matrix.variant == 'tiny' && matrix.runner != 'windows-latest'
        shell: bash
        run: |
          set -euo pipefail
          bin=packages/cli/dist-bin/${{ steps.bin.outputs.name }}
          if [[ "${{ matrix.runner }}" == "macos-latest" && "${{ matrix.target }}" != *"darwin"* ]]; then
            echo "cross-target binary; skipping execution smoke"
            exit 0
          fi
          if [[ "${{ matrix.runner }}" == "ubuntu-latest" && "${{ matrix.target }}" != *"linux-x64"* ]]; then
            echo "cross-target binary; skipping execution smoke"
            exit 0
          fi
          chmod +x "$bin"
          "$bin" --version
          "$bin" examples/minimal.nowline -o - > /tmp/minimal.svg
          head -c 4 /tmp/minimal.svg | grep -q "<svg"
          "$bin" examples/minimal.nowline -f png --headless -o /tmp/minimal.png
          head -c 4 /tmp/minimal.png | od -An -c | grep -q 'P   N   G'
          set +e
          "$bin" examples/minimal.nowline -f pdf -o /tmp/minimal.pdf
          rc=$?
          set -e
          if [[ $rc -ne 2 ]]; then
            echo "expected exit 2 from tiny binary asked for PDF, got $rc" >&2
            exit 1
          fi

      - name: Smoke test binary (full — render every format)
        if: matrix.variant == 'full' && matrix.runner != 'windows-latest'
        shell: bash
        run: |
          set -euo pipefail
          bin=packages/cli/dist-bin/${{ steps.bin.outputs.name }}
          if [[ "${{ matrix.runner }}" == "macos-latest" && "${{ matrix.target }}" != *"darwin"* ]]; then
            echo "cross-target binary; skipping execution smoke"
            exit 0
          fi
          if [[ "${{ matrix.runner }}" == "ubuntu-latest" && "${{ matrix.target }}" != *"linux-x64"* ]]; then
            echo "cross-target binary; skipping execution smoke"
            exit 0
          fi
          chmod +x "$bin"
          "$bin" --version
          "$bin" examples/minimal.nowline -o - > /tmp/minimal.svg
          "$bin" examples/minimal.nowline -f png --headless -o /tmp/minimal.png
          "$bin" examples/minimal.nowline -f pdf --headless -o /tmp/minimal.pdf
          "$bin" examples/minimal.nowline -f html -o /tmp/minimal.html
          "$bin" examples/minimal.nowline -f mermaid -o /tmp/minimal.md
          "$bin" examples/minimal.nowline -f xlsx -o /tmp/minimal.xlsx
          "$bin" examples/minimal.nowline -f msproj -o /tmp/minimal.xml
          for f in /tmp/minimal.svg /tmp/minimal.png /tmp/minimal.pdf /tmp/minimal.html /tmp/minimal.md /tmp/minimal.xlsx /tmp/minimal.xml; do
            test -s "$f" || { echo "empty: $f" >&2; exit 1; }
          done

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.bin.outputs.name }}
          path: packages/cli/dist-bin/${{ steps.bin.outputs.name }}
          if-no-files-found: error

  build-deb:
    name: Build .deb (${{ matrix.variant }} ${{ matrix.arch }})
    runs-on: ubuntu-latest
    needs: build-binaries
    strategy:
      matrix:
        include:
          - { variant: tiny, arch: amd64, suffix: linux-x64 }
          - { variant: tiny, arch: arm64, suffix: linux-arm64 }
          - { variant: full, arch: amd64, suffix: linux-x64 }
          - { variant: full, arch: arm64, suffix: linux-arm64 }
    steps:
      - uses: actions/checkout@v4

      - name: Resolve artifact name
        id: art
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ matrix.variant }}" == "full" ]]; then
            echo "name=nowline-full-${{ matrix.suffix }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=nowline-${{ matrix.suffix }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: ${{ steps.art.outputs.name }}
          path: dist-bin

      - name: Build .deb
        run: bash scripts/build-deb.sh "${{ matrix.arch }}" "dist-bin/${{ steps.art.outputs.name }}" "${GITHUB_REF_NAME#v}" "${{ matrix.variant }}"

      - name: Resolve deb name
        id: deb
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ matrix.variant }}" == "full" ]]; then
            echo "pkg=nowline-full" >> "$GITHUB_OUTPUT"
          else
            echo "pkg=nowline" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.deb.outputs.pkg }}_${{ matrix.arch }}.deb
          path: dist-deb/${{ steps.deb.outputs.pkg }}_*_${{ matrix.arch }}.deb
          if-no-files-found: error

  publish-npm:
    name: Publish npm packages
    runs-on: ubuntu-latest
    needs: build-binaries
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm -r build

      # Publish in dependency order: core layers first, then export-core,
      # then per-format export packages, then the two CLI packages.

      - name: Publish @nowline/core
        working-directory: packages/core
        run: pnpm publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @nowline/layout
        working-directory: packages/layout
        run: pnpm publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @nowline/renderer
        working-directory: packages/renderer
        run: pnpm publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @nowline/export-core
        working-directory: packages/export-core
        run: pnpm publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @nowline/export-png
        working-directory: packages/export-png
        run: pnpm publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @nowline/export-pdf
        working-directory: packages/export-pdf
        run: pnpm publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @nowline/export-html
        working-directory: packages/export-html
        run: pnpm publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @nowline/export-mermaid
        working-directory: packages/export-mermaid
        run: pnpm publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @nowline/export-xlsx
        working-directory: packages/export-xlsx
        run: pnpm publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @nowline/export-msproj
        working-directory: packages/export-msproj
        run: pnpm publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @nowline/cli
        working-directory: packages/cli
        run: pnpm publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @nowline/cli-full
        working-directory: packages/cli-full
        run: pnpm publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [build-binaries, build-deb]
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Stage release assets
        run: |
          mkdir -p release-assets
          find artifacts -type f \( -name 'nowline-*' -o -name 'nowline-full-*' -o -name '*.deb' \) -exec cp {} release-assets/ \;
          ls -la release-assets

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true

  update-homebrew-tap:
    name: Update Homebrew tap
    runs-on: ubuntu-latest
    needs: release
    steps:
      - name: Checkout lolay/tap
        uses: actions/checkout@v4
        with:
          repository: lolay/tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Download macOS/Linux binaries
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Compute SHA256s and update formulas
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          cd artifacts
          # Tiny
          SHA_DARWIN_ARM64=$(sha256sum nowline-macos-arm64/nowline-macos-arm64 | awk '{print $1}')
          SHA_DARWIN_X64=$(sha256sum nowline-macos-x64/nowline-macos-x64 | awk '{print $1}')
          SHA_LINUX_X64=$(sha256sum nowline-linux-x64/nowline-linux-x64 | awk '{print $1}')
          SHA_LINUX_ARM64=$(sha256sum nowline-linux-arm64/nowline-linux-arm64 | awk '{print $1}')
          # Full
          SHA_FULL_DARWIN_ARM64=$(sha256sum nowline-full-macos-arm64/nowline-full-macos-arm64 | awk '{print $1}')
          SHA_FULL_DARWIN_X64=$(sha256sum nowline-full-macos-x64/nowline-full-macos-x64 | awk '{print $1}')
          SHA_FULL_LINUX_X64=$(sha256sum nowline-full-linux-x64/nowline-full-linux-x64 | awk '{print $1}')
          SHA_FULL_LINUX_ARM64=$(sha256sum nowline-full-linux-arm64/nowline-full-linux-arm64 | awk '{print $1}')
          cd ../tap
          mkdir -p Formula
          cat > Formula/nowline.rb <<EOF
          class Nowline < Formula
            desc "Parse, validate, and convert .nowline roadmap files (tiny build: SVG + PNG)"
            homepage "https://github.com/lolay/nowline"
            version "${VERSION}"
            license "Apache-2.0"
            conflicts_with "nowline-full", because: "both install nowline binary"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/lolay/nowline/releases/download/v${VERSION}/nowline-macos-arm64"
                sha256 "${SHA_DARWIN_ARM64}"
              else
                url "https://github.com/lolay/nowline/releases/download/v${VERSION}/nowline-macos-x64"
                sha256 "${SHA_DARWIN_X64}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/lolay/nowline/releases/download/v${VERSION}/nowline-linux-arm64"
                sha256 "${SHA_LINUX_ARM64}"
              else
                url "https://github.com/lolay/nowline/releases/download/v${VERSION}/nowline-linux-x64"
                sha256 "${SHA_LINUX_X64}"
              end
            end

            def install
              bin.install Dir["nowline-*"].first => "nowline"
            end

            test do
              system "#{bin}/nowline", "--version"
            end
          end
          EOF

          cat > Formula/nowline-full.rb <<EOF
          class NowlineFull < Formula
            desc "Parse, validate, and convert .nowline roadmaps (full build: every format)"
            homepage "https://github.com/lolay/nowline"
            version "${VERSION}"
            license "Apache-2.0"
            conflicts_with "nowline", because: "both install nowline binary"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/lolay/nowline/releases/download/v${VERSION}/nowline-full-macos-arm64"
                sha256 "${SHA_FULL_DARWIN_ARM64}"
              else
                url "https://github.com/lolay/nowline/releases/download/v${VERSION}/nowline-full-macos-x64"
                sha256 "${SHA_FULL_DARWIN_X64}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/lolay/nowline/releases/download/v${VERSION}/nowline-full-linux-arm64"
                sha256 "${SHA_FULL_LINUX_ARM64}"
              else
                url "https://github.com/lolay/nowline/releases/download/v${VERSION}/nowline-full-linux-x64"
                sha256 "${SHA_FULL_LINUX_X64}"
              end
            end

            def install
              bin.install Dir["nowline-full-*"].first => "nowline"
            end

            test do
              system "#{bin}/nowline", "--version"
            end
          end
          EOF

          git config user.name "lolay-release-bot"
          git config user.email "bot@lolay.com"
          git add Formula/nowline.rb Formula/nowline-full.rb
          git commit -m "nowline ${VERSION}"
          git push
