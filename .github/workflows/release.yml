name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-binaries:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            target: bun-darwin-arm64
            suffix: macos-arm64
          - runner: macos-latest
            target: bun-darwin-x64
            suffix: macos-x64
          - runner: ubuntu-latest
            target: bun-linux-x64
            suffix: linux-x64
          - runner: ubuntu-latest
            target: bun-linux-arm64
            suffix: linux-arm64
          - runner: windows-latest
            target: bun-windows-x64
            suffix: windows-x64.exe
          - runner: windows-latest
            target: bun-windows-arm64
            suffix: windows-arm64.exe
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm -r build

      - name: Compile binary
        working-directory: packages/cli
        run: node scripts/compile.mjs --target=${{ matrix.target }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: nowline-${{ matrix.suffix }}
          path: packages/cli/dist-bin/nowline-${{ matrix.suffix }}
          if-no-files-found: error

  build-deb:
    name: Build .deb (${{ matrix.arch }})
    runs-on: ubuntu-latest
    needs: build-binaries
    strategy:
      matrix:
        include:
          - arch: amd64
            suffix: linux-x64
          - arch: arm64
            suffix: linux-arm64
    steps:
      - uses: actions/checkout@v4

      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: nowline-${{ matrix.suffix }}
          path: dist-bin

      - name: Build .deb
        run: bash scripts/build-deb.sh "${{ matrix.arch }}" "dist-bin/nowline-${{ matrix.suffix }}" "${GITHUB_REF_NAME#v}"

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: nowline_${{ matrix.arch }}.deb
          path: dist-deb/nowline_*_${{ matrix.arch }}.deb
          if-no-files-found: error

  publish-npm:
    name: Publish npm packages
    runs-on: ubuntu-latest
    needs: build-binaries
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm -r build

      - name: Publish @nowline/core
        working-directory: packages/core
        run: pnpm publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @nowline/cli
        working-directory: packages/cli
        run: pnpm publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [build-binaries, build-deb]
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Stage release assets
        run: |
          mkdir -p release-assets
          find artifacts -type f \( -name 'nowline-*' -o -name '*.deb' \) -exec cp {} release-assets/ \;
          ls -la release-assets

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true

  update-homebrew-tap:
    name: Update Homebrew tap
    runs-on: ubuntu-latest
    needs: release
    steps:
      - name: Checkout lolay/tap
        uses: actions/checkout@v4
        with:
          repository: lolay/tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Download macOS/Linux binaries
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Compute SHA256s and update formula
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          cd artifacts
          SHA_DARWIN_ARM64=$(sha256sum nowline-macos-arm64/nowline-macos-arm64 | awk '{print $1}')
          SHA_DARWIN_X64=$(sha256sum nowline-macos-x64/nowline-macos-x64 | awk '{print $1}')
          SHA_LINUX_X64=$(sha256sum nowline-linux-x64/nowline-linux-x64 | awk '{print $1}')
          SHA_LINUX_ARM64=$(sha256sum nowline-linux-arm64/nowline-linux-arm64 | awk '{print $1}')
          cd ../tap
          mkdir -p Formula
          cat > Formula/nowline.rb <<EOF
          class Nowline < Formula
            desc "Parse, validate, and convert .nowline roadmap files"
            homepage "https://github.com/lolay/nowline"
            version "${VERSION}"
            license "Apache-2.0"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/lolay/nowline/releases/download/v${VERSION}/nowline-macos-arm64"
                sha256 "${SHA_DARWIN_ARM64}"
              else
                url "https://github.com/lolay/nowline/releases/download/v${VERSION}/nowline-macos-x64"
                sha256 "${SHA_DARWIN_X64}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/lolay/nowline/releases/download/v${VERSION}/nowline-linux-arm64"
                sha256 "${SHA_LINUX_ARM64}"
              else
                url "https://github.com/lolay/nowline/releases/download/v${VERSION}/nowline-linux-x64"
                sha256 "${SHA_LINUX_X64}"
              end
            end

            def install
              bin.install Dir["nowline-*"].first => "nowline"
            end

            test do
              system "#{bin}/nowline", "version"
            end
          end
          EOF

          git config user.name "lolay-release-bot"
          git config user.email "bot@lolay.com"
          git add Formula/nowline.rb
          git commit -m "nowline ${VERSION}"
          git push
