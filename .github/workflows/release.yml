name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      level:
        description: 'SemVer bump level'
        type: choice
        required: true
        default: 'patch'
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  issues: write

# Workflow-level git identity for every `git commit` made by this
# workflow (cut-release commits the version bump; the github-release
# cell commits the Homebrew tap formula). git honours these env vars
# without needing per-step `git config user.name/email`. The bot
# identity lives on the maintainer company's domain (Lolay); nowline.io
# remains the project's web / docs / attribution site (see the
# attribution mark in packages/layout/src/themes/shared.ts). The
# address doesn't need to be deliverable — git just stores it as a
# string — but lolay.com keeps it close to a maintainer mailbox if a
# downstream tool ever does try to deliver to it.
env:
  GIT_AUTHOR_NAME: nowline-release-bot
  # CROSS-REFERENCE: ci.yml's `release-build-smoke` job has an `if:` filter
  # that matches on this exact email to skip the expensive 10-cell matrix on
  # bump commits. If this value ever changes, update the email literal in
  # ci.yml's `release-build-smoke` if-condition to match — otherwise bump
  # commits either redundantly run the full matrix in CI (wasted compute) or
  # the filter silently stops working (infinite-loop risk during release).
  # See ci.yml `release-build-smoke` `if:` condition.
  GIT_AUTHOR_EMAIL: nowline-release-bot@lolay.com
  GIT_COMMITTER_NAME: nowline-release-bot
  GIT_COMMITTER_EMAIL: nowline-release-bot@lolay.com

jobs:
  cut-release:
    name: Cut release (bump + tag)
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      # Use a PAT (RELEASE_TAG_PAT) instead of GITHUB_TOKEN so the tag
      # push below actually triggers downstream jobs in this same
      # workflow. GITHUB_TOKEN-pushed tags do not trigger workflow_run /
      # push events to avoid recursion; a user-scoped PAT does.
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TAG_PAT }}

      - uses: ./.github/actions/setup-node-pnpm

      - name: Bump versions
        id: bump
        # `make bump` wraps .github/scripts/bump-version.mjs, which prints the
        # new version (without the `v` prefix) to stdout and everything else to
        # stderr, so the command substitution below captures just the version.
        run: |
          set -euo pipefail
          NEW_VERSION=$(make bump LEVEL=${{ inputs.level }})
          echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Bumped to ${NEW_VERSION}"

      - name: Promote changelog
        run: |
          set -euo pipefail
          make release-changelog VERSION=${{ steps.bump.outputs.version }}

      - name: Commit, tag, and push
        env:
          NEW_VERSION: ${{ steps.bump.outputs.version }}
        run: |
          set -euo pipefail
          git add packages/*/package.json CHANGELOG.md packages/vscode-extension/CHANGELOG.md
          git commit -m "release v${NEW_VERSION}"
          git tag "v${NEW_VERSION}"
          git push origin HEAD
          git push origin "v${NEW_VERSION}"

  # Phase 1 — pack everything in parallel.
  #
  # Delegates to build.yml (the reusable 10-cell matrix shared by CI
  # and release). See build.yml for the full cell layout. Heterogeneous
  # on purpose so the publish phase can do `needs: build` and inherit
  # "wait for every cell" gating from GitHub Actions for free — no
  # separate gate job.
  build:
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    uses: ./.github/workflows/build.yml
    with:
      upload: true

  # Phase 2 — publish to every external registry.
  #
  # `needs: build` means GitHub Actions waits for every cell of the
  # build matrix to succeed before starting any cell here. That's the
  # built-in gate — no no-op job required.
  #
  # Cells download only what they need, then push. No `pnpm install`,
  # no `pnpm -r build`, no source checkout in the npm and vscode cells
  # — those are pure download + push.
  #
  # The github-release cell also commits the Homebrew tap formula at
  # the end of the same job, on the same runner, so the tap commit
  # fires right after the GH release publish without waiting on the
  # npm or vscode cells. Matrix cells can't depend on each other (no
  # intra-matrix `needs:`), and the formula references release-asset
  # URLs that have to resolve before they're committed, so chaining
  # the tap inside the cell is the only way to keep this in the matrix.
  publish:
    name: Publish ${{ matrix.id }}
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    needs: build
    runs-on: ubuntu-latest
    strategy:
      # A flaky npm publish must not cancel an in-flight Marketplace
      # publish or the github-release/tap cell. Partial failures still
      # need to be inspected and re-run individually, but neither
      # registry should hold the others hostage.
      fail-fast: false
      matrix:
        include:
          - { id: npm, kind: npm }
          - { id: vscode, kind: vscode }
          - { id: github-release, kind: github-release }
          - { id: action-mirror, kind: action-mirror }
    steps:
      # Check out the source so the publish command comes from the single
      # source of truth (`make publish-npm` / `make publish-vscode`). These
      # cells are otherwise pure download + push (no build), so a shallow
      # default checkout is enough — it just lands the Makefile on disk. It
      # runs first because actions/checkout cleans the workspace; the
      # artifact downloads below then land inside the checked-out tree.
      - name: Checkout source
        if: matrix.kind == 'npm' || matrix.kind == 'vscode'
        uses: actions/checkout@v6

      - name: Setup Node.js
        if: matrix.kind == 'npm' || matrix.kind == 'vscode'
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          registry-url: 'https://registry.npmjs.org'

      # ===== npm cell =====

      - name: Download npm tarballs
        if: matrix.kind == 'npm'
        uses: actions/download-artifact@v8
        with:
          name: npm-tarballs
          path: dist-pack

      # `make publish-npm` publishes the downloaded dist-pack/ tarballs in
      # dependency order (the digit-anchored glob + `./` path prefix logic
      # lives in the Makefile). CONFIRM_PUBLISH=1 satisfies the friction guard
      # that refuses an accidental manual run. Auth stays here via the registry
      # token; only the command is sourced from the Makefile.
      - name: Publish to npm (dependency order)
        if: matrix.kind == 'npm'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: CONFIRM_PUBLISH=1 make publish-npm

      # ===== vscode cell =====

      - name: Download .vsix
        if: matrix.kind == 'vscode'
        uses: actions/download-artifact@v8
        with:
          name: nowline-vscode.vsix
          path: dist-vsix

      # `make publish-vscode` publishes the downloaded .vsix to both the VS Code
      # Marketplace (vsce) and Open VSX (ovsx). CONFIRM_PUBLISH=1 satisfies the
      # friction guard. No `--pre-release`: per specs/releasing.md we ship every
      # tag as a stable release. Marketplace doesn't accept SemVer pre-release
      # suffixes (e.g. `0.1.0-rc.1`) so we don't model an RC channel; revisit at
      # 1.0. Both registry tokens stay here in env; only the command is sourced
      # from the Makefile.
      - name: Publish to VS Code Marketplace + Open VSX
        if: matrix.kind == 'vscode'
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: CONFIRM_PUBLISH=1 make publish-vscode VSIX=dist-vsix/nowline-vscode.vsix

      # ===== github-release cell (also commits the Homebrew tap) =====

      - name: Checkout source
        if: matrix.kind == 'github-release'
        uses: actions/checkout@v6
        with:
          path: src

      - name: Checkout lolay/homebrew-tap
        if: matrix.kind == 'github-release'
        uses: actions/checkout@v6
        with:
          # Brew tap shorthand `lolay/tap` (used in `brew install
          # lolay/tap/nowline`) maps to the GitHub repo
          # `lolay/homebrew-tap` — Homebrew strips the `homebrew-`
          # prefix only inside its own tooling. actions/checkout needs
          # the literal repo name.
          repository: lolay/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Download binary artifacts
        if: matrix.kind == 'github-release'
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: 'nowline-{macos,linux,windows}-*'

      - name: Download .deb artifacts
        if: matrix.kind == 'github-release'
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: 'nowline_*.deb'

      - name: Stage release assets
        if: matrix.kind == 'github-release'
        run: |
          set -euo pipefail
          mkdir -p release-assets
          find artifacts -type f \( -name 'nowline-*' -o -name '*.deb' \) -exec cp {} release-assets/ \;
          cp src/packages/cli/man/nowline.1 release-assets/
          cp src/packages/cli/man/nowline.5 release-assets/
          # Translated man pages flatten to nowline.<locale>.<section> in the
          # release assets so the URLs stay predictable. Each section is gated
          # independently so a locale that translates only one section still
          # ships cleanly. Loop runs zero times when no overlay directories
          # exist, so adding a new locale is a pure-data drop with no
          # workflow change.
          for d in src/packages/cli/man/*/; do
            [ -d "$d" ] || continue
            locale="$(basename "$d")"
            srcfile1="${d}nowline.1"
            srcfile5="${d}nowline.5"
            [ -f "$srcfile1" ] && cp "$srcfile1" "release-assets/nowline.${locale}.1"
            [ -f "$srcfile5" ] && cp "$srcfile5" "release-assets/nowline.${locale}.5"
          done
          ls -la release-assets

      - name: Publish GitHub Release
        if: matrix.kind == 'github-release'
        uses: softprops/action-gh-release@v3
        with:
          files: release-assets/*
          generate_release_notes: true

      - name: Compute SHA256s and update Homebrew formula
        if: matrix.kind == 'github-release'
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          # Fail loudly if any expected artifact is missing — without this
          # guard, a missing download produces an all-zero SHA and a
          # broken formula gets pushed to the tap.
          required=(
            "src/packages/cli/man/nowline.1"
            "src/packages/cli/man/nowline.5"
            "artifacts/nowline-macos-arm64/nowline-macos-arm64"
            "artifacts/nowline-macos-x64/nowline-macos-x64"
            "artifacts/nowline-linux-x64/nowline-linux-x64"
            "artifacts/nowline-linux-arm64/nowline-linux-arm64"
          )
          for f in "${required[@]}"; do
            test -s "$f" || { echo "missing or empty artifact: $f" >&2; exit 1; }
          done
          SHA_MANPAGE=$(sha256sum src/packages/cli/man/nowline.1 | awk '{print $1}')
          SHA_MANPAGE5=$(sha256sum src/packages/cli/man/nowline.5 | awk '{print $1}')
          cd artifacts
          SHA_DARWIN_ARM64=$(sha256sum nowline-macos-arm64/nowline-macos-arm64 | awk '{print $1}')
          SHA_DARWIN_X64=$(sha256sum nowline-macos-x64/nowline-macos-x64 | awk '{print $1}')
          SHA_LINUX_X64=$(sha256sum nowline-linux-x64/nowline-linux-x64 | awk '{print $1}')
          SHA_LINUX_ARM64=$(sha256sum nowline-linux-arm64/nowline-linux-arm64 | awk '{print $1}')
          cd ..

          # Discover locale overlays and emit the matching `resource` /
          # `man.install` lines for each section that has a translation. The
          # empty overlay case (no files under packages/cli/man/<locale>/)
          # skips both blocks cleanly. Each section is gated independently
          # so a locale that translates only one section still ships
          # cleanly.
          MAN_RESOURCES=""
          MAN_INSTALL=""
          for d in src/packages/cli/man/*/; do
            [ -d "$d" ] || continue
            locale="$(basename "$d")"

            srcfile1="${d}nowline.1"
            if [ -f "$srcfile1" ]; then
              sha=$(sha256sum "$srcfile1" | awk '{print $1}')
              res_name="manpage-${locale}"
              asset="nowline.${locale}.1"
              MAN_RESOURCES+="
            resource \"${res_name}\" do
              url \"https://github.com/lolay/nowline/releases/download/v${VERSION}/${asset}\"
              sha256 \"${sha}\"
            end
          "
              MAN_INSTALL+="
              resource(\"${res_name}\").stage { (share/\"man/${locale}/man1\").install \"${asset}\" => \"nowline.1\" }"
            fi

            srcfile5="${d}nowline.5"
            if [ -f "$srcfile5" ]; then
              sha=$(sha256sum "$srcfile5" | awk '{print $1}')
              res_name="manpage-${locale}-5"
              asset="nowline.${locale}.5"
              MAN_RESOURCES+="
            resource \"${res_name}\" do
              url \"https://github.com/lolay/nowline/releases/download/v${VERSION}/${asset}\"
              sha256 \"${sha}\"
            end
          "
              MAN_INSTALL+="
              resource(\"${res_name}\").stage { (share/\"man/${locale}/man5\").install \"${asset}\" => \"nowline.5\" }"
            fi
          done

          cd tap
          mkdir -p Formula
          cat > Formula/nowline.rb <<EOF
          class Nowline < Formula
            desc "Parse, validate, and convert .nowline roadmap files"
            homepage "https://github.com/lolay/nowline"
            version "${VERSION}"
            license "Apache-2.0"

            livecheck do
              url :stable
              strategy :github_latest
            end

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/lolay/nowline/releases/download/v${VERSION}/nowline-macos-arm64"
                sha256 "${SHA_DARWIN_ARM64}"
              else
                url "https://github.com/lolay/nowline/releases/download/v${VERSION}/nowline-macos-x64"
                sha256 "${SHA_DARWIN_X64}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/lolay/nowline/releases/download/v${VERSION}/nowline-linux-arm64"
                sha256 "${SHA_LINUX_ARM64}"
              else
                url "https://github.com/lolay/nowline/releases/download/v${VERSION}/nowline-linux-x64"
                sha256 "${SHA_LINUX_X64}"
              end
            end

            resource "manpage" do
              url "https://github.com/lolay/nowline/releases/download/v${VERSION}/nowline.1"
              sha256 "${SHA_MANPAGE}"
            end

            resource "manpage5" do
              url "https://github.com/lolay/nowline/releases/download/v${VERSION}/nowline.5"
              sha256 "${SHA_MANPAGE5}"
            end
          ${MAN_RESOURCES}
            def install
              bin.install Dir["nowline-*"].first => "nowline"
              resource("manpage").stage { man1.install "nowline.1" }
              resource("manpage5").stage { man5.install "nowline.5" }${MAN_INSTALL}
            end

            test do
              system "#{bin}/nowline", "--version"
            end
          end
          EOF

          git add Formula/nowline.rb
          git commit -m "nowline ${VERSION}"
          git push origin HEAD

      # ===== action-mirror cell =====
      #
      # Mirrors the Marketplace artifact built in pack-action to
      # lolay/nowline-action. Two tags per release:
      #
      #   v${VERSION}   immutable point version (`lolay/nowline-action@v0.4.0`)
      #   v${MAJOR}     moving major-tag pointer (`lolay/nowline-action@v0`)
      #
      # The README's quickstart examples reference `@v0`, matching the
      # actions/checkout@v4 / actions/cache@v4 convention; the immutable
      # tag exists for users who want to pin a specific release. During
      # 0.x the moving major has the usual pre-1.0 caveat — minor bumps
      # may include breaking changes — documented in the changelog.
      # When 1.0 ships, `v1` becomes the canonical reference and the
      # moving-tag semantics align with semver-stable convention.

      - name: Download action mirror bundle
        if: matrix.kind == 'action-mirror'
        uses: actions/download-artifact@v8
        with:
          name: action-mirror
          path: action-bundle

      - name: Checkout lolay/nowline-action
        if: matrix.kind == 'action-mirror'
        uses: actions/checkout@v6
        with:
          repository: lolay/nowline-action
          token: ${{ secrets.MARKETPLACE_MIRROR_PAT }}
          path: mirror
          # Need full history so subsequent moving-major tag retags
          # against a known parent rather than a shallow tip.
          fetch-depth: 0

      - name: Sync mirror, commit, tag, push
        if: matrix.kind == 'action-mirror'
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          MAJOR="v${VERSION%%.*}"

          # Replace mirror contents with the freshly-built bundle.
          # Preserve `.git/` so push history survives; everything else
          # in the mirror is generated output and is safe to wipe.
          # `find ... -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf`
          # avoids the `rm -rf .git` foot-gun.
          cd mirror
          find . -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          cp -R ../action-bundle/. .

          git add -A
          if git diff --cached --quiet; then
            echo "mirror bundle byte-identical to previous release; tagging current HEAD"
          else
            git commit -m "release v${VERSION}"
            git push origin HEAD
          fi

          # Immutable point tag. Hard fail if it already exists — that
          # indicates a re-pushed release with stale state, which the
          # operator needs to investigate manually.
          git tag "v${VERSION}"
          git push origin "v${VERSION}"

          # Moving major-tag pointer. Plain --force, not --force-with-lease:
          # tags have no upstream-tracking ref, so --force-with-lease can
          # only succeed on first creation and then rejects every later
          # update with "stale info" (no lease to compare against). This
          # CI is the single writer, the checkout above is fresh, and any
          # external manual push to the mirror is operator error worth
          # losing — so plain --force is both safe and necessary.
          git tag --force "$MAJOR"
          git push --force origin "$MAJOR"

      # The action is only listed on the GitHub Marketplace via Release
      # objects (tags alone don't surface there). After the first
      # human-drafted Marketplace release, subsequent releases auto-roll
      # the listing forward iff a Release exists for each new tag — so
      # we create one here. Body intentionally short: the monorepo's
      # auto-generated release notes are the source of truth for change
      # history (rich commit log, PR refs, comparison link), and
      # duplicating them on the mirror would bit-rot. We point users at
      # the monorepo release instead.
      - name: Publish GitHub Release on mirror
        if: matrix.kind == 'action-mirror'
        env:
          GH_TOKEN: ${{ secrets.MARKETPLACE_MIRROR_PAT }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          MAJOR="v${VERSION%%.*}"

          BODY=$(cat <<EOF
          This release builds \`@nowline/action\` from [\`lolay/nowline@v${VERSION}\`](https://github.com/lolay/nowline/releases/tag/v${VERSION}). Full release notes live there.

          Pin \`uses: lolay/nowline-action@v${VERSION}\` for fully reproducible builds, or \`@${MAJOR}\` to track the latest ${MAJOR}.x patch automatically.
          EOF
          )

          gh release create "v${VERSION}" \
            --repo lolay/nowline-action \
            --title "v${VERSION}" \
            --notes "$BODY" \
            --latest

  # Phase 3 — MCP marketplace (registry + .mcpb attach + manual-submission issue).
  #
  # Runs only after the whole publish matrix is green so the registry never
  # advertises a version npm lacks. Registry publish is last inside
  # publish-mcp.yml because mcp-publisher verifies npm package ownership.
  publish-mcp:
    name: Publish MCP marketplace
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    needs: [build, publish]
    uses: ./.github/workflows/publish-mcp.yml
    with:
      version: ${{ github.ref_name }}
    secrets: inherit

