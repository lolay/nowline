name: Copilot PR validate

# Enforces the agent-flow PR contract on copilot-pr-labeled PRs:
#   (1) non-empty diff
#   (2) Closes #N reference in PR body
#   (3) Assisted-by: line in PR body (## AI assistance section)
#
# On any failure: closes the PR with a consolidated comment + relabels the
# linked issue to human-author with an explanation comment.
#
# Trigger ordering:
#   labeled (non-draft only): fires after copilot-pr-stamp.yml adds the label
#     on an already-ready PR. Draft PRs are skipped here — Copilot opens a
#     placeholder draft and fills in the body later.
#   synchronize (non-draft only): re-validates on commit push for ready PRs.
#   ready_for_review: the primary validation gate for Copilot draft PRs;
#     fires when Copilot converts the draft to ready after completing the work.

on:
  pull_request:
    types: [labeled, synchronize, ready_for_review]

permissions:
  pull-requests: write
  issues: write
  contents: read

jobs:
  validate:
    name: Validate Copilot PR contract
    runs-on: ubuntu-latest
    if: >
      (github.event.action == 'labeled' && github.event.label.name == 'copilot-pr' &&
       github.event.pull_request.draft == false) ||
      (github.event.action == 'synchronize' && github.event.pull_request.draft == false &&
       contains(github.event.pull_request.labels.*.name, 'copilot-pr')) ||
      (github.event.action == 'ready_for_review' &&
       contains(github.event.pull_request.labels.*.name, 'copilot-pr'))
    env:
      # GH_AW_AGENT_TOKEN so label-add events fire downstream workflows.
      GH_TOKEN: ${{ secrets.GH_AW_AGENT_TOKEN }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      PR_BODY: ${{ github.event.pull_request.body }}
      PR_HEAD: ${{ github.event.pull_request.head.ref }}
      REPO: ${{ github.repository }}
    steps:
      - name: Run contract checks
        id: checks
        run: |
          failures=()

          # Check 1: non-empty diff
          diff_lines=$(gh pr diff "$PR_NUMBER" --repo "$REPO" | wc -l)
          if [[ "$diff_lines" -eq 0 ]]; then
            failures+=("- **Empty diff.** This PR contains no file changes. Per the empty-PR ban in \`.github/AGENT_TRIAGE.md\`, the implementation phase should have emitted \`agent-done\` (resolved-without-action) or \`human-author\` (cannot-reproduce) instead of opening this PR.")
          fi

          # Check 2: Closes #N in body
          if ! printf '%s' "$PR_BODY" | grep -Eqi 'closes?\s+#[0-9]+'; then
            failures+=("- **Missing \`Closes #N\`.**  PR body must reference the originating issue with a \`Closes #<issue>\` line on its own line (per \`agent-deep.md\` / \`agent-exec.md\` § Step 3).")
          fi

          # Check 3: Assisted-by: in body (## AI assistance section)
          if ! printf '%s' "$PR_BODY" | grep -Eqi 'assisted-by:\s*\S+'; then
            failures+=("- **Missing \`Assisted-by:\` line.** PR body must include an \`## AI assistance\` section containing an \`Assisted-by: <model>\` line (per repo \`AI_POLICY.md\`).")
          fi

          if [[ "${#failures[@]}" -eq 0 ]]; then
            echo "all_pass=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "all_pass=false" >> "$GITHUB_OUTPUT"
          printf '%s\n' "${failures[@]}" > /tmp/failures.md

      - name: Close PR with failure comment
        if: steps.checks.outputs.all_pass == 'false'
        run: |
          {
            echo "This PR was opened by Copilot's coding-agent identity but does not satisfy the agent-flow PR contract:"
            echo ""
            cat /tmp/failures.md
            echo ""
            echo "Closing this PR automatically. The originating issue (if linked via \`Closes #N\` or branch name) has been relabeled to \`human-author\` so the filer can decide next steps."
            echo ""
            echo "See \`.github/AGENT_TRIAGE.md\` for the contract details and fix guidance."
          } > /tmp/validate-comment.md

          gh pr close "$PR_NUMBER" --repo "$REPO" \
            --comment "$(cat /tmp/validate-comment.md)" \
            --delete-branch=false

      - name: Relabel linked issue to human-author
        if: steps.checks.outputs.all_pass == 'false'
        run: |
          # Prefer the GitHub closing-issues API (works even with minor Closes syntax variations)
          issue_number=$(
            gh pr view "$PR_NUMBER" --repo "$REPO" \
              --json closingIssuesReferences \
              --jq '.closingIssuesReferences[0].number // empty'
          )
          # Fallback: Copilot's branch convention is copilot/<issue-number>-description
          if [[ -z "$issue_number" ]]; then
            issue_number=$(printf '%s' "$PR_HEAD" | grep -oE 'copilot/[0-9]+' | grep -oE '[0-9]+' | head -1 || true)
          fi
          if [[ -z "$issue_number" ]]; then
            echo "No linked issue parseable from PR; skipping issue relabel."
            exit 0
          fi
          gh issue edit "$issue_number" --repo "$REPO" \
            --add-label human-author 2>/dev/null || true
          gh issue comment "$issue_number" --repo "$REPO" \
            --body "Copilot opened PR #$PR_NUMBER but it failed the agent-flow PR contract (see PR for details). The PR has been auto-closed. Please respond with what is needed to proceed, then remove the \`human-author\` label to re-fire the plan phase."
