name: Embed CDN

# Continuous-deploy pipeline for the dev tier of `@nowline/embed`:
#
#   push: main       → builds dev IIFE, deploys to embed.nowline.dev.
#   pull_request     → builds dev IIFE, deploys to a Firebase channel
#                      with a 7-day TTL; URL is commented on the PR.
#
# Production CDN deploys (embed.nowline.io) live in
# `.github/workflows/release.yml`'s `embed-prod` job — those fire on
# `v*` tag pushes alongside `npm publish`, so a release ships the npm
# tarball and the CDN bundle as one atomic operation. This workflow
# deliberately does NOT carry the prod tier so a flaky main-push
# deploy can never accidentally rewrite `embed.nowline.io/latest/`.
#
# Both jobs authenticate via the `embed-dev` environment's Workload
# Identity Federation outputs from the infrastructure repository m7 — see
# the infrastructure deploy runbook §§ 1–2 for the operator-side
# env setup and §§ 5–6 for the workflow shape and verification steps.

on:
  # Filter inverted from allowlist (`paths:`) to blocklist (`paths-ignore:`).
  # Allowlist is fail-open: a new top-level path added later silently
  # bypasses the deploy until someone updates the list. Blocklist is
  # fail-closed: any new path defaults to running the deploy, and only
  # the explicit list of trivially-irrelevant paths short-circuits.
  # Not a required check, so the "skipped workflow doesn't appear in
  # rollup" semantic is fine — we just don't fire a preview deploy on
  # docs-only PRs to save CI minutes and a Firebase preview channel.
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'specs/**'
      - '.cursor/**'
      - '.scratch/**'
      - '.github/AGENTS.md'
      - '.github/CODEOWNERS'
      - '.github/agent-prompts/**'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE.md'
  pull_request:
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'specs/**'
      - '.cursor/**'
      - '.scratch/**'
      - '.github/AGENTS.md'
      - '.github/CODEOWNERS'
      - '.github/agent-prompts/**'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE.md'
  workflow_dispatch:

# One in-flight deploy per ref. PRs cancel earlier-in-flight runs (last
# push wins for the preview channel); main-push deploys queue so we
# never half-deploy a partially-updated bundle.
concurrency:
  group: embed-cdn-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  # Build the dev IIFE once and hand it to the deploy jobs as an
  # artifact. We do NOT reuse `release.yml`'s prod build artifact —
  # that one is built without `PUBLIC_FIREBASE_*` defines (release.yml
  # is environment-less by design) and so wouldn't have a working dev
  # auth gate.
  build:
    name: Build dev IIFE
    runs-on: ubuntu-latest
    environment: embed-dev
    env:
      NOWLINE_EMBED_SHA: ${{ github.sha }}
      PUBLIC_FIREBASE_API_KEY: ${{ vars.PUBLIC_FIREBASE_API_KEY }}
      PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ vars.PUBLIC_FIREBASE_AUTH_DOMAIN }}
      PUBLIC_FIREBASE_PROJECT_ID: ${{ vars.PUBLIC_FIREBASE_PROJECT_ID }}
      PUBLIC_FIREBASE_APP_ID: ${{ vars.PUBLIC_FIREBASE_APP_ID }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node-pnpm

      - name: Build engine packages (deps of embed)
        run: pnpm -r build

      - name: Build embed dev bundle
        run: pnpm --filter @nowline/embed bundle:dev

      - name: Bundle-size gate
        run: pnpm --filter @nowline/embed check-size

      - name: Upload dev CDN artifact
        uses: actions/upload-artifact@v7
        with:
          name: embed-cdn-dev
          path: packages/embed/dist-cdn-dev/
          if-no-files-found: error

  # Continuous-deploy of `main` to embed.nowline.dev.
  embed-dev:
    name: Deploy embed.nowline.dev
    needs: build
    # Fires on push to main and on manual `gh workflow run` from main.
    # Manual dispatch is the verification path used during embed CDN
    # bring-up and after composite-action changes — see lolay/nowline-
    # infra:ops/embed-deploy.md § 6 ("verify a deploy"). PRs deploy
    # via the embed-preview job below, never here.
    if: |
      github.ref == 'refs/heads/main'
      && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    environment: embed-dev
    permissions:
      contents: read
      id-token: write
    steps:
      # Local composite actions can't be loaded until their `action.yml`
      # is on disk; the runner has nothing checked out yet at this point.
      # The composite itself does a (broader) sparse-checkout for the
      # firebase config; this one just bootstraps the action source.
      - name: Checkout composite action
        uses: actions/checkout@v6
        with:
          sparse-checkout: .github/actions/prepare-firebase-deploy

      - name: Prepare Firebase deploy
        uses: ./.github/actions/prepare-firebase-deploy
        with:
          firebase-config-path: packages/embed/firebase/dev
          artifact-name: embed-cdn-dev
          # Land the artifact INSIDE the firebase project directory so
          # firebase.json's `"public": "public"` resolves cleanly. Firebase
          # tools refuse a `public` path that escapes the directory holding
          # firebase.json, which is why we don't reuse `packages/embed/
          # dist-cdn-dev` here (that's the bundler's local output path).
          artifact-path: packages/embed/firebase/dev/public
          wif-provider: ${{ vars.WIF_PROVIDER }}
          service-account: ${{ vars.DEPLOY_SA_EMAIL }}

      - name: Deploy to Firebase Hosting (embed-dev)
        uses: w9jds/firebase-action@v15.18.0
        with:
          args: deploy --only hosting --project ${{ vars.PROJECT_ID }} --non-interactive
        env:
          PROJECT_PATH: packages/embed/firebase/dev

  # Per-PR ephemeral preview channel. 7-day TTL. URL is parsed from
  # the firebase CLI's --json output and posted/updated as a sticky
  # PR comment by a follow-up github-script step.
  #
  # We deploy via the firebase CLI directly (matching the shape used
  # by `nowline-app/.github/workflows/deploy.yml`) rather than via
  # `FirebaseExtended/action-hosting-deploy@v0`. The latter only
  # consumes inline service-account JSON for auth, which our
  # org-policy-`disableServiceAccountKeyCreation` setup cannot
  # provide; WIF (already minted by `prepare-firebase-deploy`) is the
  # idiomatic auth path for this repo and matches how the embed-dev
  # and embed-prod jobs above + release.yml's embed-prod cell already
  # talk to Firebase.
  #
  # Skipped on fork PRs because the WIF chain requires a token whose
  # `repository` claim is `lolay/nowline`; a fork's run would fail at
  # the auth step rather than silently no-op, and that confuses
  # external contributors. Re-runs from the PR's "Approve and run"
  # button (org-internal contributors) still work.
  embed-preview:
    name: Deploy PR preview channel
    needs: build
    if: |
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    environment: embed-dev
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    steps:
      # Bootstrap the local composite action (see embed-dev above).
      - name: Checkout composite action
        uses: actions/checkout@v6
        with:
          sparse-checkout: .github/actions/prepare-firebase-deploy

      - name: Prepare Firebase deploy
        uses: ./.github/actions/prepare-firebase-deploy
        with:
          firebase-config-path: packages/embed/firebase/dev
          artifact-name: embed-cdn-dev
          # See embed-dev job comment for why this lands inside the
          # firebase project directory rather than packages/embed/dist-cdn-dev.
          artifact-path: packages/embed/firebase/dev/public
          wif-provider: ${{ vars.WIF_PROVIDER }}
          service-account: ${{ vars.DEPLOY_SA_EMAIL }}

      - name: Install Firebase CLI
        # Pinned to the same version w9jds/firebase-action@v15.18.0
        # bundles for the embed-dev / embed-prod jobs so all three
        # tiers run an identical CLI. Tracked by Renovate's
        # `firebase-tools` custom manager (.github/renovate-shared.json)
        # — the same regex picks up bare `firebase-tools@<ver>` strings.
        run: npm install --global firebase-tools@15.18.0

      - name: Deploy preview channel
        id: deploy
        env:
          PROJECT_ID: ${{ vars.PROJECT_ID }}
          CHANNEL_ID: pr-${{ github.event.pull_request.number }}
        # cd into the firebase config directory so the CLI picks up
        # `firebase.json` automatically (matches PROJECT_PATH used by
        # w9jds/firebase-action in the embed-dev / embed-prod jobs).
        # `--json` parsing pattern proven in
        # nowline-app/.github/workflows/deploy.yml's deploy-free job.
        working-directory: packages/embed/firebase/dev
        run: |
          set -euo pipefail
          OUTPUT=$(firebase hosting:channel:deploy "${CHANNEL_ID}" \
            --expires 7d \
            --project "${PROJECT_ID}" \
            --json \
            --non-interactive)
          echo "$OUTPUT"
          URL=$(echo "$OUTPUT" | jq -r '.result | to_entries[0].value.url // empty')
          if [ -z "$URL" ]; then
            echo "::warning::Could not parse preview URL from firebase output; falling back to channel URL convention"
            URL="https://${PROJECT_ID}--${CHANNEL_ID}.web.app"
          fi
          echo "url=${URL}" >> "$GITHUB_OUTPUT"
          echo "Deployed preview channel: ${URL}"

      - name: Comment preview URL on PR
        # Sticky comment: locate any prior preview comment by its HTML
        # marker and update it in-place; otherwise create a fresh one.
        # Mirrors the "one comment, kept current" UX that
        # FirebaseExtended/action-hosting-deploy used to provide.
        uses: actions/github-script@v8
        env:
          PREVIEW_URL: ${{ steps.deploy.outputs.url }}
          CHANNEL_ID: pr-${{ github.event.pull_request.number }}
        with:
          script: |
            const marker = '<!-- nowline-embed-preview-comment -->';
            const url = process.env.PREVIEW_URL;
            const channelId = process.env.CHANNEL_ID;
            const body = [
              marker,
              '## Embed CDN preview',
              '',
              `Preview channel deployed: <${url}>`,
              '',
              `Channel id: \`${channelId}\` (expires in 7 days; redeployed on every push to this PR).`,
            ].join('\n');
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
