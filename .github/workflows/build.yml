name: Build

# Reusable workflow that defines the 9-cell build matrix shared by
# `ci.yml` (upload: false — shift-left smoke on every PR / main push)
# and `release.yml` (upload: true — gated on tag push). One matrix,
# two events.
#
# `upload` gates only the `actions/upload-artifact@v7` steps. Every
# build / package / verify step always runs so PRs exercise the exact
# surface a tag push would, including the .deb build, the .vsix
# package, and the action-mirror staging. Upload skipping just avoids
# paying storage cost and avoids confusing artifact promotion
# semantics on non-release runs.
on:
  workflow_call:
    inputs:
      upload:
        description: 'Upload built artifacts (release mode). When false, runs as a build-only smoke.'
        type: boolean
        default: false

# Defense-in-depth concurrency. `ci.yml` has its own workflow-level
# concurrency block (added in step 1.2 of the v0.4.0 plan); when CI
# is canceled, the in-flight reusable call is canceled automatically.
# Repeating the same shape here means any future direct caller (or
# `release.yml`) inherits cancel-on-new-push for PR events while main
# and tag pushes always complete. The expression
# `github.event_name == 'pull_request'` resolves to `false` for non-PR
# events, so sequential main commits and tag pushes never cancel each
# other.
concurrency:
  group: build-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Least-privilege. Build cells only need to read the repo, install
# deps, and upload artifacts. Artifact upload uses the runner's
# default token scope; no explicit permission required. `release.yml`
# carries `contents: write` at the workflow level because its
# `publish` job needs it — build itself never needed write, so the
# reusable shape tightens that.
permissions:
  contents: read

jobs:
  # One job, one matrix, nine cells. Heterogeneous on purpose so the
  # caller (publish in release.yml) can `needs: build` and inherit
  # "wait for every cell" gating from GitHub Actions for free — no
  # separate gate job.
  #
  # Cell layout:
  #   bin-* (×6)    Compile a `bun compile` binary for one os/arch. The
  #                 two linux cells additionally build their .deb on the
  #                 same runner (gated on `matrix.deb_arch`) so the
  #                 binary -> deb chain stays intra-cell, with no
  #                 artifact upload/download round-trip between jobs.
  #   pack-npm      `pnpm pack` the publishable packages in
  #                 dependency order. pnpm 10 rewrites `workspace:*` to
  #                 the resolved version inside the tarballs, so the
  #                 publish phase can use plain `npm publish <tarball>`.
  #   pack-vsix     `pnpm package` for the VS Code extension (esbuild
  #                 bundle + `vsce package --no-dependencies`).
  #   pack-action   Stage the Marketplace action mirror bundle.
  build:
    name: Build ${{ matrix.id }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { id: bin-macos-arm64, kind: binary, runner: macos-latest, target: bun-darwin-arm64, suffix: macos-arm64 }
          - { id: bin-macos-x64, kind: binary, runner: macos-latest, target: bun-darwin-x64, suffix: macos-x64 }
          - { id: bin-linux-x64, kind: binary, runner: ubuntu-latest, target: bun-linux-x64, suffix: linux-x64, deb_arch: amd64 }
          - { id: bin-linux-arm64, kind: binary, runner: ubuntu-latest, target: bun-linux-arm64, suffix: linux-arm64, deb_arch: arm64 }
          - { id: bin-windows-x64, kind: binary, runner: windows-latest, target: bun-windows-x64, suffix: windows-x64.exe }
          - { id: bin-windows-arm64, kind: binary, runner: windows-latest, target: bun-windows-arm64, suffix: windows-arm64.exe }
          - { id: pack-npm, kind: npm-pack, runner: ubuntu-latest }
          - { id: pack-vsix, kind: vsix-pack, runner: ubuntu-latest }
          - { id: pack-action, kind: action-pack, runner: ubuntu-latest }
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node-pnpm

      - name: Install Bun
        # Pinned to a specific version so the Bun runtime baked into
        # shipped `bun compile` binaries (Homebrew, apt, GitHub Releases)
        # is reproducible. Tracked by Renovate's custom manager — see
        # `.github/renovate-shared.json`.
        if: matrix.kind == 'binary'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'

      - name: Build
        run: pnpm -r build

      # ===== binary cells =====

      # Pre-download the target's bun runtime tarball directly into bun's
      # cache. Works around a known cross-drive bug in `bun --compile`: on
      # GitHub Actions Windows runners the workspace lives on D:\ while
      # bun's cache lives on C:\, so bun's "download to temp dir then
      # rename into cache" path fails with EXDEV and surfaces as
      #   Failed to extract executable for 'bun-windows-aarch64-vX.Y.Z'.
      #   The download may be incomplete.
      # See https://github.com/oven-sh/bun/issues/25346 and
      # https://github.com/oven-sh/bun/issues/28327. Curl-into-cache
      # sidesteps the buggy rename. Native cells (target == host) and
      # repeat runs short-circuit on the cache-hit check, so this step
      # is cheap when not strictly needed.
      - name: Pre-cache bun cross-compile target
        if: matrix.kind == 'binary'
        shell: bash
        run: |
          set -euo pipefail
          BUN_VERSION=$(bun --version)
          case "${{ matrix.target }}" in
            bun-darwin-arm64)  BUN_PLATFORM=darwin-aarch64;  BUN_BIN=bun ;;
            bun-darwin-x64)    BUN_PLATFORM=darwin-x64;      BUN_BIN=bun ;;
            bun-linux-arm64)   BUN_PLATFORM=linux-aarch64;   BUN_BIN=bun ;;
            bun-linux-x64)     BUN_PLATFORM=linux-x64;       BUN_BIN=bun ;;
            bun-windows-arm64) BUN_PLATFORM=windows-aarch64; BUN_BIN=bun.exe ;;
            bun-windows-x64)   BUN_PLATFORM=windows-x64;     BUN_BIN=bun.exe ;;
            *) echo "unknown target: ${{ matrix.target }}" >&2; exit 1 ;;
          esac
          CACHE_DIR=$(bun pm cache)
          CACHE_DEST="${CACHE_DIR}/bun-${BUN_PLATFORM}-v${BUN_VERSION}"
          if [[ -f "$CACHE_DEST" ]]; then
            echo "ok: bun-${BUN_PLATFORM}-v${BUN_VERSION} already cached at ${CACHE_DEST}"
            exit 0
          fi
          URL="https://registry.npmjs.org/@oven/bun-${BUN_PLATFORM}/-/bun-${BUN_PLATFORM}-${BUN_VERSION}.tgz"
          echo "fetching ${URL}"
          mkdir -p "$CACHE_DIR"
          TMP=$(mktemp -d)
          curl -fsSL --retry 5 --retry-delay 5 "$URL" | tar -xzf - -C "$TMP"
          if [[ -f "${TMP}/package/bin/${BUN_BIN}" ]]; then
            cp "${TMP}/package/bin/${BUN_BIN}" "$CACHE_DEST"
          elif [[ -f "${TMP}/package/${BUN_BIN}" ]]; then
            cp "${TMP}/package/${BUN_BIN}" "$CACHE_DEST"
          else
            echo "ERROR: ${BUN_BIN} not found in tarball; contents:" >&2
            find "$TMP" -type f >&2
            exit 1
          fi
          chmod +x "$CACHE_DEST" 2>/dev/null || true
          ls -lh "$CACHE_DEST"

      - name: Compile binary
        if: matrix.kind == 'binary'
        # `make compile` runs from the repo root and cd's into packages/cli.
        # bash so the windows-latest binary cells use Git Bash (ships make).
        shell: bash
        run: make compile TARGET=${{ matrix.target }}

      # Renders examples/minimal.nowline to every output format and asserts
      # each artifact is non-empty. The command lives in scripts/smoke-binary.sh
      # (wrapped by `make smoke`) so a local run and CI exercise it identically;
      # the MATRIX_* env below is what that script reads.
      - name: Smoke test binary (render every format)
        if: matrix.kind == 'binary' && matrix.runner != 'windows-latest'
        shell: bash
        env:
          MATRIX_RUNNER: ${{ matrix.runner }}
          MATRIX_TARGET: ${{ matrix.target }}
          MATRIX_SUFFIX: ${{ matrix.suffix }}
        run: make smoke

      - name: Upload binary artifact
        if: matrix.kind == 'binary' && inputs.upload
        uses: actions/upload-artifact@v7
        with:
          name: nowline-${{ matrix.suffix }}
          path: packages/cli/dist-bin/nowline-${{ matrix.suffix }}
          if-no-files-found: error

      # Version comes from `packages/cli/package.json` rather than
      # `${GITHUB_REF_NAME#v}` so this step works on PR runs too
      # (where GITHUB_REF_NAME would be the branch/PR ref, not a
      # `vX.Y.Z` tag). The package.json version is also what
      # `cut-release` bumps and what the binary's `--version` reports,
      # so the .deb's stamp stays in sync with the binary it wraps on
      # both PR smoke runs and tag releases.
      # `make deb` derives the binary suffix and the version (from
      # packages/cli/package.json — works on PR runs too, where GITHUB_REF_NAME
      # isn't a vX.Y.Z tag) internally, so the deb's stamp stays in sync with
      # the binary it wraps on both PR smoke runs and tag releases.
      - name: Build .deb
        if: matrix.deb_arch
        run: make deb ARCH=${{ matrix.deb_arch }}

      - name: Upload .deb artifact
        if: matrix.deb_arch && inputs.upload
        uses: actions/upload-artifact@v7
        with:
          name: nowline_${{ matrix.deb_arch }}.deb
          path: dist-deb/nowline_*_${{ matrix.deb_arch }}.deb
          if-no-files-found: error

      # ===== pack-npm cell =====

      # `make pack` packs the publishable packages into dist-pack/ in
      # dependency order (core layers, then the browser pipeline + embed +
      # preview-shell, then the LSP pair, export-core, the per-format export
      # packages, and finally the CLI). pnpm pack rewrites `workspace:*` to the
      # resolved version inside each .tgz, so the publish phase needs only npm.
      - name: Pack npm tarballs
        if: matrix.kind == 'npm-pack'
        run: make pack

      - name: Upload npm tarballs
        if: matrix.kind == 'npm-pack' && inputs.upload
        uses: actions/upload-artifact@v7
        with:
          name: npm-tarballs
          path: dist-pack/*.tgz
          if-no-files-found: error

      # ===== pack-vsix cell =====

      - name: Package .vsix
        if: matrix.kind == 'vsix-pack'
        run: make vsix

      - name: Upload .vsix
        if: matrix.kind == 'vsix-pack' && inputs.upload
        uses: actions/upload-artifact@v7
        with:
          name: nowline-vscode.vsix
          path: packages/vscode-extension/dist/nowline-vscode.vsix
          if-no-files-found: error

      # ===== pack-action cell =====
      #
      # The Marketplace action is mirrored to lolay/nowline-action — a
      # write-only publish target like the Homebrew tap, not a source-of-
      # truth repo. Source lives at packages/nowline-action/. The mirror
      # ships exactly four files at its repo root: action.yml, dist/,
      # README.md, LICENSE. action.yml MUST be at the mirror's repo root
      # (nested paths don't satisfy GitHub Marketplace's listing
      # requirements). esbuild produced dist/index.cjs in the earlier
      # `pnpm -r build` step.

      - name: Verify action bundle exists
        if: matrix.kind == 'action-pack'
        run: |
          set -euo pipefail
          test -s packages/nowline-action/dist/index.cjs || { echo "missing or empty packages/nowline-action/dist/index.cjs" >&2; exit 1; }
          test -s packages/nowline-action/action.yml
          test -s packages/nowline-action/README.md
          test -s packages/nowline-action/LICENSE

      - name: Stage action mirror bundle
        if: matrix.kind == 'action-pack'
        run: |
          set -euo pipefail
          mkdir -p dist-action
          cp packages/nowline-action/action.yml dist-action/
          cp packages/nowline-action/README.md dist-action/
          cp packages/nowline-action/LICENSE dist-action/
          cp -R packages/nowline-action/dist dist-action/
          ls -laR dist-action

      - name: Upload action mirror bundle
        if: matrix.kind == 'action-pack' && inputs.upload
        uses: actions/upload-artifact@v7
        with:
          name: action-mirror
          # Trailing slash → archive contents are at the artifact root
          # (action.yml, README.md, LICENSE, dist/index.cjs). Matches
          # the publish cell's `path: action-bundle` download contract.
          path: dist-action/
          if-no-files-found: error

