name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-workflows:
    name: Lint workflows (actionlint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-pnpm

      - name: Install actionlint
        run: |
          bash <(curl -sSf https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash) 1.7.12
          echo "$PWD" >> "$GITHUB_PATH"

      - name: Lint workflows
        run: pnpm lint:workflows

  build-test:
    name: Build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-pnpm

      - name: Build all packages
        run: pnpm build

      - name: Lint
        run: pnpm -r lint --if-present
        continue-on-error: false

      - name: Test
        run: pnpm -r test

  compile-smoke:
    name: Bun compile smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: build-test
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, target: bun-linux-x64 }
          - { os: macos-latest, target: bun-darwin-arm64 }
          - { os: windows-latest, target: bun-windows-x64 }
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-pnpm

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build all packages
        run: pnpm build

      - name: Compile single target (smoke)
        working-directory: packages/cli
        run: node scripts/compile.mjs --target=${{ matrix.target }}

      - name: Smoke — binary (Linux/macOS)
        if: runner.os != 'Windows'
        working-directory: packages/cli
        run: |
          set -euo pipefail
          shopt -s nullglob
          bins=(dist-bin/nowline-*)
          BIN="${bins[0]}"
          EXAMPLE=../../examples/minimal.nowline
          OUT="${RUNNER_TEMP:-/tmp}/minimal"
          chmod +x "$BIN"
          "$BIN" --version
          "$BIN" "$EXAMPLE" --dry-run
          "$BIN" "$EXAMPLE" -o - > "$OUT.svg"
          head -c 4 "$OUT.svg" | grep -q "<svg"
          "$BIN" "$EXAMPLE" -f png --headless -o "$OUT.png"
          head -c 4 "$OUT.png" | od -An -c | grep -q 'P   N   G'
          "$BIN" "$EXAMPLE" -f pdf --headless -o "$OUT.pdf"
          "$BIN" "$EXAMPLE" -f html -o "$OUT.html"
          "$BIN" "$EXAMPLE" -f mermaid -o "$OUT.md"
          "$BIN" "$EXAMPLE" -f xlsx -o "$OUT.xlsx"
          "$BIN" "$EXAMPLE" -f msproj -o "$OUT.xml"
          for ext in svg png pdf html md xlsx xml; do
            test -s "$OUT.$ext" || { echo "empty: $OUT.$ext" >&2; exit 1; }
          done

      - name: Smoke — binary (Windows)
        if: runner.os == 'Windows'
        working-directory: packages/cli
        shell: pwsh
        run: |
          $bin = (Get-ChildItem dist-bin/nowline-*.exe | Select-Object -First 1).FullName
          $example = '../../examples/minimal.nowline'
          $outDir = if ($env:RUNNER_TEMP) { $env:RUNNER_TEMP } else { 'C:\Temp' }
          $out = Join-Path $outDir 'minimal'
          & $bin --version
          & $bin $example --dry-run
          $svg = & $bin $example -o -
          if (-not $svg.StartsWith("<svg")) { throw "render did not emit SVG" }
          & $bin $example -f png --headless -o "$out.png"
          & $bin $example -f pdf --headless -o "$out.pdf"
          & $bin $example -f html -o "$out.html"
          & $bin $example -f mermaid -o "$out.md"
          & $bin $example -f xlsx -o "$out.xlsx"
          & $bin $example -f msproj -o "$out.xml"
