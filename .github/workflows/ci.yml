name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    name: Build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm -r build

      - name: Lint
        run: pnpm -r lint --if-present
        continue-on-error: false

      - name: Test
        run: pnpm -r test

  compile-smoke:
    name: Bun compile smoke (${{ matrix.os }} ${{ matrix.variant }})
    runs-on: ${{ matrix.os }}
    needs: build-test
    strategy:
      fail-fast: false
      matrix:
        include:
          - { variant: tiny, os: ubuntu-latest, target: bun-linux-x64 }
          - { variant: tiny, os: macos-latest, target: bun-darwin-arm64 }
          - { variant: tiny, os: windows-latest, target: bun-windows-x64 }
          - { variant: full, os: ubuntu-latest, target: bun-linux-x64 }
          - { variant: full, os: macos-latest, target: bun-darwin-arm64 }
          - { variant: full, os: windows-latest, target: bun-windows-x64 }
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm -r build

      - name: Compile single target (smoke)
        working-directory: packages/cli
        run: node scripts/compile.mjs --target=${{ matrix.target }} --variant=${{ matrix.variant }}

      - name: Smoke — tiny binary (Linux/macOS)
        if: matrix.variant == 'tiny' && runner.os != 'Windows'
        working-directory: packages/cli
        run: |
          set -euo pipefail
          BIN="$(ls dist-bin/nowline-* | grep -v 'nowline-full-' | head -n 1)"
          chmod +x "$BIN"
          "$BIN" --version
          "$BIN" ../../examples/minimal.nowline --dry-run
          "$BIN" ../../examples/minimal.nowline -o - > /tmp/minimal.svg
          head -c 4 /tmp/minimal.svg | grep -q "<svg"
          "$BIN" ../../examples/minimal.nowline -f png --headless -o /tmp/minimal.png
          head -c 4 /tmp/minimal.png | od -An -c | grep -q 'P   N   G'
          set +e
          out=$("$BIN" ../../examples/minimal.nowline -f pdf -o /tmp/minimal.pdf 2>&1)
          rc=$?
          set -e
          if [[ $rc -ne 2 ]]; then
            echo "expected tiny binary to refuse PDF with exit 2, got $rc" >&2
            echo "$out" >&2
            exit 1
          fi
          echo "$out" | grep -q "nowline-full" || { echo "missing nowline-full hint" >&2; exit 1; }

      - name: Smoke — full binary (Linux/macOS)
        if: matrix.variant == 'full' && runner.os != 'Windows'
        working-directory: packages/cli
        run: |
          set -euo pipefail
          BIN="$(ls dist-bin/nowline-full-* | head -n 1)"
          chmod +x "$BIN"
          "$BIN" --version
          "$BIN" ../../examples/minimal.nowline -o - > /tmp/minimal.svg
          "$BIN" ../../examples/minimal.nowline -f png --headless -o /tmp/minimal.png
          "$BIN" ../../examples/minimal.nowline -f pdf --headless -o /tmp/minimal.pdf
          "$BIN" ../../examples/minimal.nowline -f html -o /tmp/minimal.html
          "$BIN" ../../examples/minimal.nowline -f mermaid -o /tmp/minimal.md
          "$BIN" ../../examples/minimal.nowline -f xlsx -o /tmp/minimal.xlsx
          "$BIN" ../../examples/minimal.nowline -f msproj -o /tmp/minimal.xml
          for f in /tmp/minimal.svg /tmp/minimal.png /tmp/minimal.pdf /tmp/minimal.html /tmp/minimal.md /tmp/minimal.xlsx /tmp/minimal.xml; do
            test -s "$f" || { echo "empty: $f" >&2; exit 1; }
          done

      - name: Smoke — tiny binary (Windows)
        if: matrix.variant == 'tiny' && runner.os == 'Windows'
        working-directory: packages/cli
        shell: pwsh
        run: |
          $bin = (Get-ChildItem dist-bin/nowline-*.exe | Where-Object { $_.Name -notlike 'nowline-full-*' } | Select-Object -First 1).FullName
          & $bin --version
          & $bin ../../examples/minimal.nowline --dry-run
          $svg = & $bin ../../examples/minimal.nowline -o -
          if (-not $svg.StartsWith("<svg")) { throw "render did not emit SVG" }
          & $bin ../../examples/minimal.nowline -f png --headless -o C:\Temp\minimal.png
          & $bin ../../examples/minimal.nowline -f pdf -o C:\Temp\minimal.pdf 2>&1
          if ($LASTEXITCODE -ne 2) { throw "expected tiny binary to refuse PDF with exit 2, got $LASTEXITCODE" }

      - name: Smoke — full binary (Windows)
        if: matrix.variant == 'full' && runner.os == 'Windows'
        working-directory: packages/cli
        shell: pwsh
        run: |
          $bin = (Get-ChildItem dist-bin/nowline-full-*.exe | Select-Object -First 1).FullName
          & $bin --version
          & $bin ../../examples/minimal.nowline -f png --headless -o C:\Temp\minimal.png
          & $bin ../../examples/minimal.nowline -f pdf --headless -o C:\Temp\minimal.pdf
          & $bin ../../examples/minimal.nowline -f html -o C:\Temp\minimal.html
          & $bin ../../examples/minimal.nowline -f mermaid -o C:\Temp\minimal.md
          & $bin ../../examples/minimal.nowline -f xlsx -o C:\Temp\minimal.xlsx
          & $bin ../../examples/minimal.nowline -f msproj -o C:\Temp\minimal.xml
