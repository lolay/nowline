name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least-privilege workflow token. CI only reads code; no jobs need to
# write to the repo, post comments, or mint OIDC tokens. Job-level
# `permissions:` blocks can grant more when a specific job needs it.
permissions:
  contents: read

# Cancel prior in-flight runs for the same PR on each new push (last push
# wins). Main-branch pushes each get their own group (refs/heads/main resolves
# uniquely per commit via github.ref), and `cancel-in-progress` resolves to
# `false` for non-PR events so sequential main-branch commits never cancel
# each other — the version-bump commit's build always completes.
concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint-workflows:
    name: Lint workflows (actionlint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node-pnpm

      - name: Install actionlint
        run: |
          bash <(curl -sSf https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash) 1.7.12
          echo "$PWD" >> "$GITHUB_PATH"

      - name: Lint workflows
        run: pnpm lint:workflows

  build-test:
    # Matrix layout: every supported OS runs on the dev/CI Node version
    # (26, matching .nvmrc), plus an extra Linux-only cell on Node 22 to
    # exercise the published consumer floor (`engines.node: ">=22"` in
    # every @nowline/* package.json). See CONTRIBUTING.md §
    # "Toolchain & Supported Versions" for the two-tier policy. Adding
    # the floor cell only on Linux keeps the matrix at 4 cells instead
    # of doubling it on every OS — macOS/Windows cells exist to catch
    # OS-specific issues, not Node-version regressions.
    name: Build & test (${{ matrix.os }}, node ${{ matrix.node-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, node-version: '22' }
          - { os: ubuntu-latest, node-version: '26' }
          - { os: macos-latest, node-version: '26' }
          - { os: windows-latest, node-version: '26' }
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node-pnpm
        with:
          node-version: ${{ matrix.node-version }}

      - name: Build all packages
        run: pnpm build

      - name: Lint and format check
        run: pnpm check

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm -r test

  bundle-size:
    name: Embed bundle size gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node-pnpm

      - name: Build core / layout / renderer / browser / embed
        run: pnpm -r --filter @nowline/core --filter @nowline/layout --filter @nowline/renderer --filter @nowline/browser --filter @nowline/embed run build

      - name: Check bundle size + node:* leak
        run: pnpm --filter @nowline/embed check-size --print-attribution

  release-build-smoke:
    name: Release build smoke (no upload)
    needs: build-test
    # Skip the full 10-cell matrix on version-bump commits authored by the
    # release bot. Lint / typecheck / test (build-test above) still run —
    # only the expensive compile+package matrix is skipped, because release.yml
    # is about to run the same matrix with upload:true in parallel.
    #
    # CROSS-REFERENCE: the email literal below must match the
    # `GIT_AUTHOR_EMAIL` env var set at the TOP of release.yml
    # (currently "nowline-release-bot@lolay.com"). If they ever drift,
    # bump commits will either (a) redundantly run this expensive matrix
    # alongside release.yml's identical run, or (b) silently stop being
    # filtered if the bot identity changes. Keep both in sync.
    if: ${{ github.event_name != 'push' || github.event.head_commit.author.email != 'nowline-release-bot@lolay.com' }}
    uses: ./.github/workflows/build.yml
    with:
      upload: false
