name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least-privilege workflow token. CI only reads code; no jobs need to
# write to the repo, post comments, or mint OIDC tokens. Job-level
# `permissions:` blocks can grant more when a specific job needs it.
permissions:
  contents: read

jobs:
  lint-workflows:
    name: Lint workflows (actionlint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node-pnpm

      - name: Install actionlint
        run: |
          bash <(curl -sSf https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash) 1.7.12
          echo "$PWD" >> "$GITHUB_PATH"

      - name: Lint workflows
        run: pnpm lint:workflows

  build-test:
    # Matrix layout: every supported OS runs on the dev/CI Node version
    # (26, matching .nvmrc), plus an extra Linux-only cell on Node 22 to
    # exercise the published consumer floor (`engines.node: ">=22"` in
    # every @nowline/* package.json). See CONTRIBUTING.md §
    # "Toolchain & Supported Versions" for the two-tier policy. Adding
    # the floor cell only on Linux keeps the matrix at 4 cells instead
    # of doubling it on every OS — macOS/Windows cells exist to catch
    # OS-specific issues, not Node-version regressions.
    name: Build & test (${{ matrix.os }}, node ${{ matrix.node-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, node-version: '22' }
          - { os: ubuntu-latest, node-version: '26' }
          - { os: macos-latest, node-version: '26' }
          - { os: windows-latest, node-version: '26' }
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node-pnpm
        with:
          node-version: ${{ matrix.node-version }}

      - name: Build all packages
        run: pnpm build

      - name: Lint and format check
        run: pnpm check

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm -r test

  bundle-size:
    name: Embed bundle size gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node-pnpm

      - name: Build core / layout / renderer / browser / embed
        run: pnpm -r --filter @nowline/core --filter @nowline/layout --filter @nowline/renderer --filter @nowline/browser --filter @nowline/embed run build

      - name: Check bundle size + node:* leak
        run: pnpm --filter @nowline/embed check-size --print-attribution

  compile-smoke:
    name: Bun compile smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: build-test
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, target: bun-linux-x64 }
          - { os: macos-latest, target: bun-darwin-arm64 }
          - { os: windows-latest, target: bun-windows-x64 }
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node-pnpm

      - name: Install Bun
        # Pinned to a specific version so the Bun runtime baked into
        # shipped `bun compile` binaries (Homebrew, apt, GitHub Releases)
        # is reproducible. Tracked by Renovate's custom manager — see
        # `.github/renovate-shared.json`.
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'

      - name: Build all packages
        run: pnpm build

      - name: Compile single target (smoke)
        working-directory: packages/cli
        run: node scripts/compile.mjs --target=${{ matrix.target }}

      - name: Smoke — binary (Linux/macOS)
        if: runner.os != 'Windows'
        working-directory: packages/cli
        run: |
          set -euo pipefail
          shopt -s nullglob
          bins=(dist-bin/nowline-*)
          BIN="${bins[0]}"
          EXAMPLE=../../examples/minimal.nowline
          OUT="${RUNNER_TEMP:-/tmp}/minimal"
          chmod +x "$BIN"
          "$BIN" --version
          "$BIN" "$EXAMPLE" --dry-run
          "$BIN" "$EXAMPLE" -o - > "$OUT.svg"
          head -c 4 "$OUT.svg" | grep -q "<svg"
          "$BIN" "$EXAMPLE" -f png --headless -o "$OUT.png"
          head -c 4 "$OUT.png" | od -An -c | grep -q 'P   N   G'
          "$BIN" "$EXAMPLE" -f pdf --headless -o "$OUT.pdf"
          "$BIN" "$EXAMPLE" -f html -o "$OUT.html"
          "$BIN" "$EXAMPLE" -f mermaid -o "$OUT.md"
          "$BIN" "$EXAMPLE" -f xlsx -o "$OUT.xlsx"
          "$BIN" "$EXAMPLE" -f msproj -o "$OUT.xml"
          for ext in svg png pdf html md xlsx xml; do
            test -s "$OUT.$ext" || { echo "empty: $OUT.$ext" >&2; exit 1; }
          done

      - name: Smoke — binary (Windows)
        if: runner.os == 'Windows'
        working-directory: packages/cli
        shell: pwsh
        run: |
          $bin = (Get-ChildItem dist-bin/nowline-*.exe | Select-Object -First 1).FullName
          $example = '../../examples/minimal.nowline'
          $outDir = if ($env:RUNNER_TEMP) { $env:RUNNER_TEMP } else { 'C:\Temp' }
          $out = Join-Path $outDir 'minimal'
          & $bin --version
          & $bin $example --dry-run
          $svg = & $bin $example -o -
          if (-not $svg.StartsWith("<svg")) { throw "render did not emit SVG" }
          & $bin $example -f png --headless -o "$out.png"
          & $bin $example -f pdf --headless -o "$out.pdf"
          & $bin $example -f html -o "$out.html"
          & $bin $example -f mermaid -o "$out.md"
          & $bin $example -f xlsx -o "$out.xlsx"
          & $bin $example -f msproj -o "$out.xml"
