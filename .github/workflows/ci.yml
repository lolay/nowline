name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least-privilege workflow token. CI only reads code; no jobs need to
# write to the repo, post comments, or mint OIDC tokens. Job-level
# `permissions:` blocks can grant more when a specific job needs it.
permissions:
  contents: read

# Cancel prior in-flight runs for the same PR on each new push (last push
# wins). Main-branch pushes each get their own group (refs/heads/main resolves
# uniquely per commit via github.ref), and `cancel-in-progress` resolves to
# `false` for non-PR events so sequential main-branch commits never cancel
# each other — the version-bump commit's build always completes.
concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint-workflows:
    name: Lint workflows (actionlint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node-pnpm

      - name: Install actionlint
        run: |
          bash <(curl -sSf https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash) 1.7.12
          echo "$PWD" >> "$GITHUB_PATH"

      - name: Lint workflows
        run: make lint-workflows

  triage:
    name: triage (env doctor)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node-pnpm

      - uses: lolay/triage-action@v0.3
        with:
          profile: ci

  build-test:
    # Matrix layout: every supported OS runs on the dev/CI Node version
    # (26, matching .nvmrc), plus an extra Linux-only cell on Node 22 to
    # exercise the published consumer floor (`engines.node: ">=22"` in
    # every @nowline/* package.json). See CONTRIBUTING.md §
    # "Toolchain & Supported Versions" for the two-tier policy. Adding
    # the floor cell only on Linux keeps the matrix at 4 cells instead
    # of doubling it on every OS — macOS/Windows cells exist to catch
    # OS-specific issues, not Node-version regressions.
    name: Build & test (${{ matrix.os }}, node ${{ matrix.node-version }})
    runs-on: ${{ matrix.os }}
    # Run every step under bash on all three OSes so the `make` gate steps
    # below work on the windows-latest cell too (Git Bash ships make + bash).
    # Linux/macOS already default to bash, so this only changes the Windows cell.
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, node-version: '22' }
          - { os: ubuntu-latest, node-version: '26' }
          - { os: macos-latest, node-version: '26' }
          - { os: windows-latest, node-version: '26' }
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node-pnpm
        with:
          node-version: ${{ matrix.node-version }}

      - name: Build all packages
        run: make build

      - name: Lint and format check
        run: make lint

      - name: Typecheck
        run: make typecheck

      - name: Test
        run: make test

  bundle-size:
    name: Embed bundle size gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node-pnpm

      - name: Check bundle size + node:* leak
        run: make bundle-size

  determinism:
    # Cross-surface export-determinism gate (specs/export-determinism.md §
    # Enforcement). Deliberately a single dedicated job, NOT part of the
    # multi-OS build-test matrix: it needs a compiled `bun compile` binary and
    # a headless browser, which the matrix does not provision. One canonical
    # environment (ubuntu, Node from .nvmrc) keeps the binary-format goldens
    # (pdf/png) stable — they are pinned per toolchain version, not per OS.
    name: Export determinism gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node-pnpm

      # Pinned to match the runtime baked into shipped binaries (build.yml).
      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'

      - name: Build all packages
        run: make build-fast

      # Surface (a): the standalone binary users actually run (here: linux-x64).
      - name: Compile local CLI binary
        run: make compile TARGET=local

      # Surfaces (a) + (b): compiled CLI binary vs kernel-in-Node.
      - name: Node + compiled-CLI determinism legs
        run: make determinism

      # Surface (c): kernel in a headless browser. install-deps pulls the
      # system libraries chromium-headless-shell needs on a clean runner;
      # `make determinism-browser` then installs the browser and runs the leg.
      - name: Headless-browser determinism leg
        run: |
          pnpm --filter @nowline/integration-tests exec playwright install-deps chromium
          make determinism-browser

  mcp-harness:
    # MCP integration harness (specs/mcp.md § Testing the MCP server). Single
    # ubuntu job — needs a headless browser for the AppBridge UI leg and runs
    # the Inspector CLI smoke against the built stdio server. Not part of the
    # multi-OS matrix for the same reasons as determinism above.
    name: MCP harness gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node-pnpm

      - name: Build all packages
        run: make build

      - name: MCP Inspector CLI smoke
        run: make mcp-inspector-smoke

      - name: MCP Apps AppBridge e2e
        run: |
          pnpm --filter @nowline/integration-tests exec playwright install-deps chromium
          make mcp-app-e2e

  release-build-smoke:
    name: Release build smoke (no upload)
    needs: build-test
    # Skip the full 10-cell matrix on version-bump commits authored by the
    # release bot. Lint / typecheck / test (build-test above) still run —
    # only the expensive compile+package matrix is skipped, because release.yml
    # is about to run the same matrix with upload:true in parallel.
    #
    # CROSS-REFERENCE: the email literal below must match the
    # `GIT_AUTHOR_EMAIL` env var set at the TOP of release.yml
    # (currently "nowline-release-bot@lolay.com"). If they ever drift,
    # bump commits will either (a) redundantly run this expensive matrix
    # alongside release.yml's identical run, or (b) silently stop being
    # filtered if the bot identity changes. Keep both in sync.
    if: ${{ github.event_name != 'push' || github.event.head_commit.author.email != 'nowline-release-bot@lolay.com' }}
    uses: ./.github/workflows/build.yml
    with:
      upload: false
