name: 'Prepare Firebase Hosting deploy'
description: 'Sparse-checkout the firebase.json directory, download the named CDN artifact, then authenticate to GCP via Workload Identity Federation. Caller still runs the actual `firebase deploy` step so each tier (prod / dev / per-PR preview) can pick the right deploy action and args.'

# Composite action consumed by `release.yml`'s `embed-prod` cell and
# `embed-cdn.yml`'s `embed-dev` + `embed-preview` cells. Each tier's
# deploy step (firebase-action vs action-hosting-deploy) stays in its
# caller workflow because they don't share a deploy interface — the
# preview channel needs `action-hosting-deploy`'s PR-comment side
# effect and a different input shape.
#
# All three callers feed the same three GitHub environment-scoped vars
# from the infrastructure repository's WIF outputs (WIF_PROVIDER, DEPLOY_SA_EMAIL,
# PROJECT_ID — see the infrastructure deploy runbook § 2).
# The action takes those as explicit inputs rather than reading
# `${{ vars.X }}` directly because composite actions have no access to
# workflow-level `vars` context; the caller substitutes them.

inputs:
  firebase-config-path:
    description: 'Repo-relative directory containing the tier `firebase.json` (e.g. `packages/embed/firebase/dev`).'
    required: true
  artifact-name:
    description: 'Name of the CDN artifact to download (e.g. `embed-cdn-prod`).'
    required: true
  artifact-path:
    description: 'Where the downloaded artifact tree should land. Must match the `"public"` path inside firebase.json once resolved relative to it.'
    required: true
  wif-provider:
    description: 'Workload Identity Federation provider. The caller typically passes vars.WIF_PROVIDER from a workflow-scoped vars context (composite actions cannot read vars directly, hence the explicit input).'
    required: true
  service-account:
    description: 'Deploy service-account email. The caller typically passes vars.DEPLOY_SA_EMAIL from a workflow-scoped vars context.'
    required: true
  extra-checkout-paths:
    description: 'Additional sparse-checkout paths to fetch alongside firebase-config-path. One path per line. Useful when the deploy needs sibling files (e.g. package.json for a banner-version assertion).'
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Checkout firebase config
      uses: actions/checkout@v6
      with:
        # Include this composite's own directory so the runner can still
        # find action.yml during the post-phase cleanup. Without it the
        # sparse checkout wipes the manifest the runner loaded us from
        # and the job fails after the deploy step with "Can't find
        # action.yml ... Did you forget to run actions/checkout?".
        sparse-checkout: |
          .github/actions/prepare-firebase-deploy
          ${{ inputs.firebase-config-path }}
          ${{ inputs.extra-checkout-paths }}
        # Disable cone-mode so `extra-checkout-paths` can name individual
        # files (e.g. `packages/embed/package.json`). Cone-mode requires
        # directory paths and fails fatal on file paths, which broke the
        # v0.4.0 embed-prod deploy (caller passed package.json for the
        # banner-version assertion in the deploy step). The fixed-path
        # entries above are still single-segment so cone-vs-no-cone
        # matching behavior is identical for them; only the variable
        # `extra-checkout-paths` benefits.
        sparse-checkout-cone-mode: false

    - name: Download CDN artifact
      uses: actions/download-artifact@v8
      with:
        name: ${{ inputs.artifact-name }}
        path: ${{ inputs.artifact-path }}

    - name: Authenticate to GCP via Workload Identity Federation
      uses: google-github-actions/auth@v3
      with:
        workload_identity_provider: ${{ inputs.wif-provider }}
        service_account: ${{ inputs.service-account }}
