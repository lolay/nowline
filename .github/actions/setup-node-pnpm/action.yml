name: 'Setup Node.js + pnpm + install dependencies'
description: 'Install pnpm, set up Node.js 22 with the pnpm cache, then install workspace dependencies with --frozen-lockfile.'

# Composite action so every workflow job that needs the standard
# pnpm + Node toolchain can share one place to bump versions or change
# install flags. Jobs still call `actions/checkout@v4` themselves
# because checkout parameters (token, fetch-depth, path) vary across
# callers — keeping checkout in the workflow keeps this action
# parameter-free.
runs:
  using: composite
  steps:
    - name: Install pnpm
      uses: pnpm/action-setup@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: pnpm

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile
