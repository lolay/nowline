name: 'Setup Node.js + pnpm + install dependencies'
description: 'Provision pnpm via corepack, set up Node.js with the pnpm cache, then install workspace dependencies with --frozen-lockfile.'

# Composite action so every workflow job that needs the standard
# pnpm + Node toolchain can share one place to bump versions or change
# install flags. Jobs still call `actions/checkout@v6` themselves
# because checkout parameters (token, fetch-depth, path) vary across
# callers — keeping checkout in the workflow keeps this action
# parameter-free.
#
# pnpm is provisioned via `corepack enable`, which reads the
# `packageManager: pnpm@<version>` pin from the root package.json.
# This replaces pnpm/action-setup, which ran a `pnpm self-update` step
# on Windows that intermittently crashed with STATUS_STACK_BUFFER_OVERRUN
# (exit 3221226505) — an open upstream bug in pnpm/action-setup#260.
# Corepack is built into every Node shipped on GitHub-hosted runners and
# sidesteps the self-installer entirely.
#
# corepack enable must run before setup-node so pnpm is on PATH when
# setup-node probes the store path for cache: pnpm.
#
# The Node version is governed by the two-tier policy documented in
# `CONTRIBUTING.md` § "Toolchain & Supported Versions": the default
# `26` is the dev/CI version, matching `.nvmrc`. Callers can override
# via the `node-version` input (the unit-test matrix in `ci.yml` does
# this to also test against the published consumer floor of Node 22).
inputs:
  node-version:
    description: 'Node.js major or full version to install (matches .nvmrc by default).'
    required: false
    default: '26'
  skip-install:
    description: 'Skip the workspace `pnpm install`. The caller must run install itself (e.g. with --cpu/--os flags to pull in cross-target optional native deps).'
    required: false
    default: 'false'
runs:
  using: composite
  steps:
    - name: Enable corepack
      shell: bash
      run: corepack enable

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}
        cache: pnpm

    - name: Install dependencies
      if: inputs.skip-install != 'true'
      shell: bash
      run: pnpm install --frozen-lockfile
